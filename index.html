<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Laboratório de Imagens</title>
    <meta name="description" content="Laboratório para criação e exportação de posts visuais em alta qualidade." />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧪</text></svg>" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="app">
      <!-- Header -->
      <header class="header" id="header">
        <div class="header-left">
          <div class="logo">
            <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="url(#logoGrad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <defs>
                <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#a78bfa" />
                  <stop offset="100%" stop-color="#6366f1" />
                </linearGradient>
              </defs>
              <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
            </svg>
          </div>
          <div>
            <h1 class="header-title">Laboratório de Imagens</h1>
            <p class="header-subtitle">Crie, visualize e exporte posts visuais</p>
          </div>
        </div>
        <div class="header-right">
          <span class="badge" id="post-count">0 posts</span>
        </div>
      </header>

      <!-- Filters -->
      <div class="filters" id="filters">
        <button class="filter-btn active" data-filter="all">Todos</button>
        <button class="filter-btn" data-filter="1080x1080">Feed 1:1</button>
        <button class="filter-btn" data-filter="1080x1350">Feed 4:5</button>
        <button class="filter-btn" data-filter="1080x1920">Story</button>
      </div>

      <!-- Gallery Grid -->
      <main class="gallery" id="gallery">
        <!-- Cards rendered by JS -->
      </main>

      <!-- Empty State -->
      <div class="empty-state" id="empty-state" style="display:none;">
        <div class="empty-icon">🧪</div>
        <h2>Nenhum post encontrado</h2>
        <p>Peça ao agente IA para criar seu primeiro post!</p>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>

<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Laboratório de Imagens</title>
    <meta name="description" content="Laboratório para criação e exportação de posts visuais em alta qualidade." />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧪</text></svg>" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="app">
      <!-- Header -->
      <header class="header" id="header">
        <div class="header-left">
          <div class="logo">
            <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="url(#logoGrad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <defs>
                <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#a78bfa" />
                  <stop offset="100%" stop-color="#6366f1" />
                </linearGradient>
              </defs>
              <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
            </svg>
          </div>
          <div>
            <h1 class="header-title">Laboratório de Imagens</h1>
            <p class="header-subtitle">Crie, visualize e exporte posts visuais</p>
          </div>
        </div>
        <div class="header-right">
          <span class="badge" id="post-count">0 posts</span>
        </div>
      </header>

      <!-- Filters -->
      <div class="filters-container">
        <div class="filters" id="filters">
          <button class="filter-btn active" data-filter="all">Todos</button>
          <button class="filter-btn" data-filter="1080x1080">Feed 1:1</button>
          <button class="filter-btn" data-filter="1080x1350">Feed 4:5</button>
          <button class="filter-btn" data-filter="1080x1920">Story</button>
          <button class="filter-btn danger" data-filter="trash">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 6px;"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
            Lixeira
          </button>
        </div>
        <div class="filters folder-filters" id="folder-filters">
          <!-- Folder Pills Injected Here -->
        </div>
      </div>

      <!-- Categories Container (Injected by JS) -->
      <div id="categories-container"></div>

      <!-- Gallery Grid (Fallback/All view) -->
      <main class="gallery" id="gallery">
        <!-- Cards rendered by JS -->
      </main>

      <!-- Empty State -->
      <div class="empty-state" id="empty-state" style="display:none;">
        <div class="empty-icon">🧪</div>
        <h2>Nenhum post encontrado</h2>
        <p>Peça ao agente IA para criar seu primeiro post!</p>
      </div>

      <!-- Edit Modal (Glassmorphism) -->
      <div class="modal-overlay" id="edit-modal" style="display: none;">
        <div class="modal-content">
          <div class="modal-header">
            <h2 class="modal-title">Editar Propriedades</h2>
            <button class="modal-close" id="close-modal">✕</button>
          </div>
          <div class="modal-body">
            <div class="form-group">
              <label>Nome do Post</label>
              <input type="text" id="edit-title" class="input-field" placeholder="Ex: Novo Post Premium" />
            </div>
            <div class="form-group">
              <label>Descrição</label>
              <textarea id="edit-desc" class="input-field" rows="3" placeholder="Detalhes curtos..."></textarea>
            </div>
            <div class="form-group">
              <label>Pasta (Categoria)</label>
              <div class="category-picker">
                <select id="edit-category-select" class="input-field" style="width: 100%;">
                  <!-- Options generated by JS -->
                </select>
                <input type="text" id="edit-category-input" class="input-field" placeholder="Nome da nova pasta..." style="display: none; width: 100%; margin-top: 8px;" />
              </div>
            </div>
          </div>
          <div class="modal-footer">
            <button class="btn-secondary" id="cancel-modal">Cancelar</button>
            <button class="btn-primary" id="save-modal">Salvar Alterações</button>
          </div>
        </div>
      </div>

      <!-- Dropzone Overlay -->
      <div id="dropzone-overlay" class="dropzone-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(99, 102, 241, 0.9); z-index:9999; justify-content:center; align-items:center; flex-direction:column; backdrop-filter:blur(8px);">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 24px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
        <h2 style="color:white; font-size: 2rem; margin:0;">Solte para salvar na Caixa de Entrada</h2>
        <p style="color:rgba(255,255,255,0.8); font-size:1.1rem; margin-top:12px;">A imagem ficará disponível fisicamente para a I.A usar nos seus posts reais.</p>
      </div>

    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>

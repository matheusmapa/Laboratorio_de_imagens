<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    .story {
        width: 1080px;
        height: 1920px;
        position: relative;
        overflow: hidden;
        background: #f8fafc;
        font-family: 'Inter', sans-serif;
        box-sizing: border-box;
    }

    /* === ZONAS SEGURAS ABSOLUTAS === */
    .safe-zone {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        padding-top: 200px;
        padding-bottom: 250px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 10;
        box-sizing: border-box;
    }

    /* === ORBES PREMIUM === */
    .orb-cyan {
        position: absolute;
        width: 800px;
        height: 800px;
        background: #cffafe;
        border-radius: 50%;
        top: 15%;
        left: -200px;
        filter: blur(150px);
        z-index: 0;
    }

    .orb-magenta {
        position: absolute;
        width: 700px;
        height: 700px;
        background: #fbcfe8;
        border-radius: 50%;
        top: 40%;
        right: -150px;
        filter: blur(150px);
        z-index: 0;
    }

    .orb-mint {
        position: absolute;
        width: 900px;
        height: 900px;
        background: #d1fae5;
        border-radius: 50%;
        bottom: 10%;
        left: 100px;
        filter: blur(150px);
        z-index: 0;
    }

    /* === GLASSMORPHISM REAL === */
    .glass-card {
        background: rgba(255, 255, 255, 0.45);
        backdrop-filter: blur(28px);
        -webkit-backdrop-filter: blur(28px);
        border: 1px solid rgba(255, 255, 255, 0.8);
        box-shadow: 0 40px 80px rgba(0,0,0,0.06);
        padding: 60px;
        border-radius: 48px;
        width: 90%;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        box-sizing: border-box;
        gap: 0; /* Controlando espaços manualmente para o bloco sólido */
    }

    .headline {
        font-size: 80px;
        font-weight: 900;
        color: #000000;
        line-height: 1.05;
        letter-spacing: -3px;
        margin: 0;
        margin-bottom: 8px; /* Colado aos bullets */
    }

    .bullet-points {
        font-size: 26px;
        font-weight: 700;
        color: #334155;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-wrap: wrap;
        gap: 12px;
        margin-bottom: 40px; /* Distância pro botão */
    }

    /* === TEXTO CTA COM EMOJI === */
    .cta-text {
        font-size: 36px;
        font-weight: 700;
        color: #334155;
        margin-bottom: 30px;
        line-height: 1.4;
    }

    .cta-text .emoji {
        font-size: 48px;
        display: block;
        margin-top: 12px;
    }

    /* === ESPAÇO DO STICKER DE LINK === */
    .link-placeholder {
        width: 100%;
        max-width: 600px;
        padding: 32px 48px;
        background: rgba(16, 185, 129, 0.05);
        border: 3px dashed #10B981;
        border-radius: 100px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #10B981;
        font-size: 26px;
        font-weight: 800;
        box-sizing: border-box;
    }
</style>

<div class="story">
    <div class="orb-cyan"></div>
    <div class="orb-magenta"></div>
    <div class="orb-mint"></div>

    <div class="safe-zone">
        <div class="glass-card">
            
            <h2 class="headline">Assine por<br>R$ 19,90/mês.</h2>

            <div class="bullet-points">
                <span>Plano Mensal</span>
                <span style="color: #cbd5e1;">•</span>
                <span>Plataforma Completa</span>
                <span style="color: #cbd5e1;">•</span>
                <span>Garantia de 7 Dias</span>
            </div>
            
            <p class="cta-text">Clique no link abaixo pra hackear sua rotina<span class="emoji">👇</span></p>

            <div class="link-placeholder">
                <span>🔗 [ COLE O ADESIVO DE LINK AQUI ]</span>
            </div>

        </div>
    </div>
</div>

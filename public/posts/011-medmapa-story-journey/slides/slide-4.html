<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    .story {
        width: 1080px;
        height: 1920px;
        position: relative;
        overflow: hidden;
        background: #f8fafc;
        font-family: 'Inter', sans-serif;
        box-sizing: border-box;
    }

    /* === ZONAS SEGURAS ABSOLUTAS === */
    .safe-zone {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        padding-top: 200px;
        padding-bottom: 250px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 10;
        box-sizing: border-box;
    }

    /* === ORBES PREMIUM CORRIGIDAS === */
    .orb-cyan {
        position: absolute;
        width: 800px;
        height: 800px;
        background: #cffafe;
        border-radius: 50%;
        top: 15%;
        left: -200px;
        filter: blur(150px);
        z-index: 0;
    }

    .orb-magenta {
        position: absolute;
        width: 700px;
        height: 700px;
        background: #fbcfe8;
        border-radius: 50%;
        top: 40%;
        right: -150px;
        filter: blur(150px);
        z-index: 0;
    }

    .orb-mint {
        position: absolute;
        width: 900px;
        height: 900px;
        background: #d1fae5;
        border-radius: 50%;
        bottom: 10%;
        left: 100px;
        filter: blur(150px);
        z-index: 0;
    }

    /* === GLASSMORPHISM REAL REVISADO === */
    .glass-card {
        background: rgba(255, 255, 255, 0.45);
        backdrop-filter: blur(28px);
        -webkit-backdrop-filter: blur(28px);
        border: 1px solid rgba(255, 255, 255, 0.8);
        box-shadow: 0 40px 80px rgba(0,0,0,0.06);
        padding: 60px;
        border-radius: 48px;
        width: 90%;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 24px;
        box-sizing: border-box;
    }

    .headline {
        font-size: 72px;
        font-weight: 900;
        color: #000000;
        line-height: 1.05;
        letter-spacing: -3px;
        margin: 0;
        width: 90%; /* Respiro interno */
    }

    .card-text {
        font-size: 36px;
        font-weight: 500;
        color: #334155;
        line-height: 1.4;
        margin: 0;
        width: 95%; /* Respiro interno */
    }

    /* === PLACEHOLDER DE IMAGEM === */
    .image-placeholder {
        width: 100%;
        height: 380px;
        border: 4px dashed #10B981; /* Verde conforme regra */
        border-radius: 32px;
        background: rgba(16, 185, 129, 0.05); /* Fundo verde super sutil */
        display: flex;
        align-items: center;
        justify-content: center;
        margin-top: 24px;
        box-sizing: border-box;
    }

    .image-placeholder-text {
        font-size: 24px;
        font-weight: 800;
        color: #10B981;
        text-transform: uppercase;
        letter-spacing: 2px;
    }
</style>

<div class="story">
    <div class="orb-cyan"></div>
    <div class="orb-magenta"></div>
    <div class="orb-mint"></div>

    <div class="safe-zone">
        <div class="glass-card">
            <h2 class="headline">BANCO INTELIGENTE.</h2>
            <p class="card-text">Filtros de alta performance para Grandes Bancas (ENARE, USP, UNICAMP, SUS). Milhares de questões cirúrgicas, comentadas.</p>
            
            <div class="image-placeholder">
                <span class="image-placeholder-text">📷 [ INSIRA O PRINT DO APP AQUI ]</span>
            </div>
        </div>
    </div>
</div>

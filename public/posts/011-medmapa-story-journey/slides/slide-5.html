<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    .story {
        width: 1080px;
        height: 1920px;
        position: relative;
        overflow: hidden;
        background: #f8fafc;
        font-family: 'Inter', sans-serif;
        box-sizing: border-box;
    }

    /* === ZONAS SEGURAS ABSOLUTAS === */
    .safe-zone {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        padding-top: 200px;
        padding-bottom: 250px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 10;
        box-sizing: border-box;
    }

    /* === ORBES PREMIUM === */
    .orb-cyan {
        position: absolute;
        width: 800px;
        height: 800px;
        background: #cffafe;
        border-radius: 50%;
        top: 15%;
        left: -200px;
        filter: blur(150px);
        z-index: 0;
    }

    .orb-magenta {
        position: absolute;
        width: 700px;
        height: 700px;
        background: #fbcfe8;
        border-radius: 50%;
        top: 40%;
        right: -150px;
        filter: blur(150px);
        z-index: 0;
    }

    .orb-mint {
        position: absolute;
        width: 900px;
        height: 900px;
        background: #d1fae5;
        border-radius: 50%;
        bottom: 10%;
        left: 100px;
        filter: blur(150px);
        z-index: 0;
    }

    /* === GLASSMORPHISM REAL === */
    .glass-card {
        background: rgba(255, 255, 255, 0.45);
        backdrop-filter: blur(28px);
        -webkit-backdrop-filter: blur(28px);
        border: 1px solid rgba(255, 255, 255, 0.8);
        box-shadow: 0 40px 80px rgba(0,0,0,0.06);
        padding: 50px 60px; /* Levemente reduzido pra agrupar o ícone */
        border-radius: 48px;
        width: 90%;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 20px;
        box-sizing: border-box;
    }

    .icon-box {
        width: 80px;
        height: 80px;
        background: rgba(16, 185, 129, 0.1);
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 10px;
    }

    .icon-box svg {
        color: #10B981;
        width: 40px;
        height: 40px;
    }

    .headline {
        font-size: 72px;
        font-weight: 900;
        color: #000000;
        line-height: 1.05;
        letter-spacing: -3px;
        margin: 0;
        width: 100%;
    }

    .card-text {
        font-size: 34px;
        font-weight: 500;
        color: #334155;
        line-height: 1.4;
        margin: 0;
        width: 95%;
    }

    /* === PLACEHOLDER DE IMAGEM === */
    .image-placeholder {
        width: 100%;
        height: 340px; /* Um pouco menor pra acomodar o ícone em cima */
        border: 4px dashed #10B981;
        border-radius: 32px;
        background: rgba(16, 185, 129, 0.05);
        display: flex;
        align-items: center;
        justify-content: center;
        margin-top: 16px;
        box-sizing: border-box;
    }

    .image-placeholder-text {
        font-size: 24px;
        font-weight: 800;
        color: #10B981;
        text-transform: uppercase;
        letter-spacing: 2px;
    }
</style>

<div class="story">
    <div class="orb-cyan"></div>
    <div class="orb-magenta"></div>
    <div class="orb-mint"></div>

    <div class="safe-zone">
        <div class="glass-card">
            
            <!-- Ícone de Cérebro Minimalista -->
            <div class="icon-box">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 1.98-3A2.5 2.5 0 0 1 9.5 2Z"/>
                    <path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96.44 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-1.98-3A2.5 2.5 0 0 0 14.5 2Z"/>
                </svg>
            </div>

            <h2 class="headline">IA & CADERNO DE ERROS.</h2>
            <p class="card-text">Gestão inteligente que mapeia onde você tropeça e te recomenda revisões personalizadas das matérias que você odeia.</p>
            
            <div class="image-placeholder">
                <span class="image-placeholder-text">📷 [ INSIRA O PRINT DO APP AQUI ]</span>
            </div>
        </div>
    </div>
</div>

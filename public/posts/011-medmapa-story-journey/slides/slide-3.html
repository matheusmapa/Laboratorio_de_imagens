<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    .story {
        width: 1080px;
        height: 1920px;
        position: relative;
        overflow: hidden;
        background: #f8fafc;
        font-family: 'Inter', sans-serif;
        box-sizing: border-box;
    }

    /* === ZONAS SEGURAS ABSOLUTAS === */
    .safe-zone {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        padding-top: 200px;
        padding-bottom: 250px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 10;
        box-sizing: border-box;
    }

    /* === ORBES PREMIUM CORRIGIDAS === */
    .orb-cyan {
        position: absolute;
        width: 800px;
        height: 800px;
        background: #cffafe;
        border-radius: 50%;
        top: 15%;
        left: -200px;
        filter: blur(150px);
        z-index: 0;
    }

    .orb-magenta {
        position: absolute;
        width: 700px;
        height: 700px;
        background: #fbcfe8;
        border-radius: 50%;
        top: 40%;
        right: -150px;
        filter: blur(150px);
        z-index: 0;
    }

    .orb-mint {
        position: absolute;
        width: 900px;
        height: 900px;
        background: #d1fae5;
        border-radius: 50%;
        bottom: 10%;
        left: 100px;
        filter: blur(150px);
        z-index: 0;
    }

    .content-area {
        width: 100%; /* Toma o container mas usa padding para respirar */
        padding: 0 5%;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        box-sizing: border-box;
    }

    .logo-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-bottom: 50px;
    }

    .logo-giant {
        width: 160px;
        height: 160px;
        color: #0f172a;
        margin-bottom: 10px; /* Colado no nome */
    }

    .brand-name {
        font-size: 64px;
        font-weight: 800;
        color: #0f172a;
        margin: 0;
        letter-spacing: -2px;
    }

    .headline {
        font-size: 72px; /* Ajustado para caber em 1 linha de 1080px com 5% de padding lateral */
        font-weight: 900;
        color: #000000;
        line-height: 1;
        letter-spacing: -2px;
        margin: 0 0 30px 0;
        white-space: nowrap;
    }

    .subtitle {
        font-size: 36px;
        font-weight: 500;
        color: #334155;
        line-height: 1.5;
        width: 90%;
        margin: 0 auto;
    }
</style>

<div class="story">
    <div class="orb-cyan"></div>
    <div class="orb-magenta"></div>
    <div class="orb-mint"></div>

    <div class="safe-zone">
        <div class="content-area">
            <div class="logo-container">
                <!-- Ícone minimalista mapa dobrado -->
                <svg class="logo-giant" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"></polygon>
                    <line x1="9" y1="3" x2="9" y2="18"></line>
                    <line x1="15" y1="6" x2="15" y2="21"></line>
                </svg>
                <p class="brand-name">MedMapa</p>
            </div>
            
            <h1 class="headline">HACKEAMOS O FORMATO.</h1>
            <p class="subtitle">Apresentamos o MedMapa. O ecossistema de alta performance construído para a rotina caótica do estudante de medicina.</p>
        </div>
    </div>
</div>

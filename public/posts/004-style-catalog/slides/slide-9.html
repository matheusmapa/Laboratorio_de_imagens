<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    .slide {
        width: 1080px;
        height: 1350px;
        background: #030612;
        font-family: 'Inter', sans-serif;
        position: relative;
        padding: 80px;
        display: flex;
        flex-direction: column;
        box-sizing: border-box;
        color: white;
    }

    .title {
        font-size: 80px;
        font-weight: 900;
        margin-bottom: 60px;
    }

    .lib-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 40px;
    }

    .comp {
        background: rgba(255, 255, 255, 0.03);
        padding: 40px;
        border-radius: 32px;
        border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .label {
        color: #3b82f6;
        font-weight: 800;
        margin-bottom: 20px;
        text-transform: uppercase;
        font-size: 18px;
    }

    /* Componentes Reais */
    .btn {
        background: #3b82f6;
        color: white;
        padding: 20px 40px;
        border-radius: 12px;
        font-weight: 800;
        display: inline-block;
    }

    .tag {
        background: rgba(59, 130, 246, 0.2);
        border: 1px solid #3b82f6;
        color: #3b82f6;
        padding: 8px 16px;
        border-radius: 100px;
        font-size: 14px;
        font-weight: 700;
    }

    .progress-bar {
        width: 100%;
        height: 12px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 6px;
        overflow: hidden;
    }

    .progress-fill {
        width: 75%;
        height: 100%;
        background: #3b82f6;
    }
</style>

<div class="slide">
    <h1 class="title">Componentes.</h1>

    <div class="lib-grid">
        <div class="comp">
            <div class="label">Buttons</div>
            <div class="btn">Confirmar Aula</div>
        </div>
        <div class="comp">
            <div class="label">Labels</div>
            <div class="tag">EM ALTA</div>
        </div>
        <div class="comp" style="grid-column: span 2;">
            <div class="label">Data Vis</div>
            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>
            <p style="margin-top: 20px; opacity: 0.5;">75% do curso concluído</p>
        </div>
    </div>
</div>

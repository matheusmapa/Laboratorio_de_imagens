<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    .slide {
        width: 1080px;
        height: 1350px;
        background: #000;
        font-family: 'Inter', sans-serif;
        position: relative;
        padding: 100px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        box-sizing: border-box;
        color: white;
        overflow: hidden;
    }

    /* FILTRO DE GRÃO SVG */
    .grain-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        opacity: 0.15;
        z-index: 10;
        pointer-events: none;
        filter: url(#noiseFilter);
    }

    .bg-gradient {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle at 100% 0%, #1e3a8a 0%, #000 70%);
        z-index: 0;
    }

    .content {
        position: relative;
        z-index: 1;
    }

    .title {
        font-size: 110px;
        font-weight: 900;
        line-height: 0.9;
        margin-bottom: 40px;
    }

    .paper-card {
        background: #fff;
        color: #000;
        padding: 60px;
        border-radius: 4px;
        transform: rotate(-2deg);
        box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5);
    }
</style>

<!-- Injeção do SVG de Ruído -->
<svg style="position: absolute; width: 0; height: 0;">
    <filter id="noiseFilter">
        <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" />
    </filter>
</svg>

<div class="slide">
    <div class="bg-gradient"></div>
    <div class="grain-overlay"></div> <!-- O Grão é aplicado aqui -->

    <div class="content">
        <h1 class="title">Film Grain<br>& Texture.</h1>

        <div class="paper-card">
            <p style="font-size: 32px; font-weight: 700;">Texturas orgânicas removem o ar "digital artificial" e dão um
                aspecto premium de revista/cinema.</p>
        </div>
    </div>
</div>

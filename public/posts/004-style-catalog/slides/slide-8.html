<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    .slide {
        width: 1080px;
        height: 1350px;
        background: #030612;
        font-family: 'Inter', sans-serif;
        position: relative;
        padding: 100px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        box-sizing: border-box;
        color: white;
    }

    .aura {
        position: absolute;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle at 50% 120%, #3b82f6 0%, transparent 50%);
        opacity: 0.5;
        z-index: 0;
    }

    .glow-card {
        width: 700px;
        background: #000;
        border-radius: 40px;
        padding: 80px;
        text-align: center;
        position: relative;
        z-index: 1;
        border: 1px solid rgba(59, 130, 246, 0.5);
        box-shadow: 0 0 60px rgba(59, 130, 246, 0.3);
    }

    .glow-card::before {
        content: '';
        position: absolute;
        inset: -2px;
        background: linear-gradient(45deg, #3b82f6, transparent, #8b5cf6);
        border-radius: 42px;
        z-index: -1;
    }

    .title {
        font-size: 80px;
        font-weight: 900;
        margin-bottom: 20px;
        color: #fff;
    }
</style>

<div class="slide">
    <div class="aura"></div>

    <div class="glow-card">
        <h2 class="title">Edge<br>Diffusion.</h2>
        <p style="font-size: 28px; opacity: 0.7;">Contornos de luz e sombras projetadas criam o clima "High-Tech"
            perfeito.</p>
    </div>
</div>

<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    .slide {
        width: 1080px;
        height: 1350px;
        background: #030612;
        font-family: 'Inter', sans-serif;
        position: relative;
        padding: 80px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        box-sizing: border-box;
        color: white;
    }

    /* IPHONE FRAME 100% CSS */
    .iphone {
        width: 440px;
        height: 900px;
        background: #000;
        border-radius: 60px;
        border: 12px solid #1a1a1a;
        position: relative;
        box-shadow: 0 100px 200px rgba(0, 0, 0, 0.8);
        overflow: hidden;
    }

    .iphone-screen {
        width: 100%;
        height: 100%;
        background-color: #3b82f6;
        background-image: linear-gradient(135deg, #1e3a8a, #030612);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 40px;
        text-align: center;
    }

    .notch {
        position: absolute;
        top: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 150px;
        height: 30px;
        background: #000;
        border-bottom-left-radius: 20px;
        border-bottom-right-radius: 20px;
        z-index: 10;
    }

    .info {
        width: 500px;
    }

    .title {
        font-size: 80px;
        font-weight: 900;
        line-height: 1;
        margin-bottom: 40px;
    }

    .badge {
        background: #3b82f6;
        padding: 10px 20px;
        border-radius: 100px;
        font-weight: 800;
        margin-bottom: 20px;
        display: inline-block;
    }
</style>

<div class="slide">
    <div class="info">
        <div class="badge">100% CODADO</div>
        <h1 class="title">Mockups em Código.</h1>
        <p style="font-size: 28px; color: rgba(255,255,255,0.6);">Não espere por designers. Crie seus próprios frames e
            devices usando apenas Divs e Bordas.</p>
    </div>

    <div class="iphone">
        <div class="notch"></div>
        <div class="iphone-screen">
            <div style="font-size: 60px;">📱</div>
            <div style="font-weight: 900; font-size: 32px; margin-top:20px;">App Preview</div>
            <div
                style="width: 200px; height: 10px; background: rgba(255,255,255,0.2); border-radius: 5px; margin-top: 40px;">
            </div>
            <div
                style="width: 150px; height: 10px; background: rgba(255,255,255,0.2); border-radius: 5px; margin-top: 20px;">
            </div>
        </div>
    </div>
</div>

<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    .slide {
        width: 1080px;
        height: 1350px;
        background: #000;
        font-family: 'Inter', sans-serif;
        position: relative;
        padding: 100px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        box-sizing: border-box;
        color: white;
        overflow: hidden;
    }

    .blob {
        position: absolute;
        width: 800px;
        height: 800px;
        background: linear-gradient(135deg, #3b82f6, #8b5cf6);
        clip-path: polygon(30% 0%, 70% 0%, 100% 30%, 100% 70%, 70% 100%, 30% 100%, 0% 70%, 0% 30%);
        opacity: 0.3;
        z-index: 0;
        animation: rotate 20s linear infinite;
    }

    @keyframes rotate {
        from {
            transform: rotate(0deg) scale(1);
        }

        50% {
            transform: rotate(180deg) scale(1.2);
        }

        to {
            transform: rotate(360deg) scale(1);
        }
    }

    .content {
        position: relative;
        z-index: 1;
    }

    .title {
        font-size: 110px;
        font-weight: 900;
        margin-bottom: 40px;
    }

    .pill {
        background: rgba(255, 255, 255, 0.1);
        padding: 40px;
        border-radius: 60px;
        clip-path: inset(0 0 0 0 round 60px);
        /* RECORTE DINAMICO */
        border: 1px solid rgba(255, 255, 255, 0.2);
        font-size: 32px;
        font-weight: 600;
    }
</style>

<div class="slide">
    <div class="blob" style="top: -200px; right: -200px;"></div>

    <div class="content">
        <h1 class="title">Clip-path<br>Mastery.</h1>
        <div class="pill">
            Fuja dos retângulos. Use recortes matemáticos para criar formas orgânicas, blobs e máscaras complexas em
            qualquer elemento.
        </div>
    </div>
</div>

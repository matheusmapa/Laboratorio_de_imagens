<style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@900&display=swap');

    .slide-wrapper {
        width: 1080px;
        height: 1350px;
        background: #000;
        font-family: 'Space Mono', monospace;
        position: relative;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        color: #fff;
    }

    /* Seamless Optical Illusion Background */
    .bg-gradient {
        position: absolute;
        inset: -20%;
        background: radial-gradient(circle at 20% 30%, #ff00ff 0%, transparent 40%),
            radial-gradient(circle at 80% 70%, #00ffff 0%, transparent 40%),
            #000;
        filter: blur(80px) saturate(2);
        z-index: 0;
        animation: drift 20s infinite alternate linear;
    }

    @keyframes drift {
        from {
            transform: rotate(0deg) scale(1);
        }

        to {
            transform: rotate(5deg) scale(1.1);
        }
    }

    /* Digital Noise Filter */
    .noise {
        position: absolute;
        inset: 0;
        background: url('https://grainy-gradients.vercel.app/noise.svg');
        filter: contrast(150%) brightness(100%);
        opacity: 0.15;
        z-index: 1;
        pointer-events: none;
    }

    .main-text-rotated {
        position: absolute;
        left: 50px;
        top: 50%;
        transform: translateY(-50%) rotate(-90deg);
        font-family: 'Inter', sans-serif;
        font-size: 110px;
        font-weight: 950;
        line-height: 0.8;
        letter-spacing: -8px;
        white-space: nowrap;
        background: linear-gradient(to right, #00ffff, #fff, #ff00ff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        z-index: 5;
        filter: drop-shadow(0 0 20px rgba(0, 255, 255, 0.5));
    }

    .glitch-container {
        position: relative;
        z-index: 10;
        max-width: 700px;
        margin-left: 200px;
    }

    .broken-text {
        font-size: 64px;
        font-weight: 700;
        line-height: 1;
        text-transform: uppercase;
        position: relative;
    }

    .overlap {
        position: absolute;
        top: 5px;
        left: 5px;
        color: #ff00ff;
        opacity: 0.5;
        z-index: -1;
    }

    .survival-text {
        margin-top: 50px;
        font-size: 38px;
        background: #fff;
        color: #000;
        padding: 10px 20px;
        display: inline-block;
        transform: skewX(-15deg);
        font-weight: 700;
    }

    .hint {
        position: absolute;
        bottom: 50px;
        right: 80px;
        font-size: 24px;
        opacity: 0.6;
        letter-spacing: 5px;
        animation: blink 1s infinite;
    }

    @keyframes blink {

        0%,
        100% {
            opacity: 0.2;
        }

        50% {
            opacity: 0.8;
        }
    }
</style>

<div class="slide-wrapper">
    <div class="bg-gradient"></div>
    <div class="noise"></div>

    <div class="main-text-rotated">ELES ESTÃO MENTINDO</div>

    <div class="glitch-container">
        <div class="broken-text">
            Sua aprovação no R1 não é sobre inteligência.
            <div class="overlap">Sua aprovação no R1 não é sobre inteligência.</div>
        </div>
        <div class="survival-text">É SOBRE SOBREVIVÊNCIA.</div>
    </div>

    <div class="hint">ARRRASTE PARA CONSERTAR >>></div>
</div>

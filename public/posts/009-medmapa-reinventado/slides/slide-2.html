<style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@900&display=swap');

    .slide-wrapper {
        width: 1080px;
        height: 1350px;
        background: #000;
        font-family: 'Space Mono', monospace;
        position: relative;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 100px;
        box-sizing: border-box;
        color: #fff;
    }

    .bg-gradient {
        position: absolute;
        inset: -20%;
        background: radial-gradient(circle at 80% 20%, #ff00ff 0%, transparent 40%),
            radial-gradient(circle at 20% 80%, #00ffff 0%, transparent 40%),
            #000;
        filter: blur(80px) saturate(2);
        z-index: 0;
        transform: rotate(180deg);
    }

    .noise {
        position: absolute;
        inset: 0;
        background: url('https://grainy-gradients.vercel.app/noise.svg');
        filter: contrast(180%) brightness(120%);
        opacity: 0.2;
        z-index: 1;
        pointer-events: none;
    }

    .title {
        font-size: 90px;
        font-weight: 900;
        letter-spacing: -4px;
        line-height: 0.9;
        margin-bottom: 80px;
        z-index: 5;
        font-family: 'Inter', sans-serif;
    }

    .matrix-content {
        display: flex;
        flex-direction: column;
        gap: 40px;
        z-index: 5;
    }

    .broken-card {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        padding: 40px;
        backdrop-filter: blur(10px);
        transform: rotate(-2deg);
        position: relative;
    }

    .broken-card:nth-child(even) {
        transform: rotate(3deg);
        background: rgba(255, 255, 255, 0.02);
    }

    .broken-card::before {
        content: '';
        position: absolute;
        width: 100%;
        height: 1px;
        background: #ff00ff;
        top: 50%;
        left: 0;
        opacity: 0.3;
    }

    .card-text {
        font-size: 32px;
        line-height: 1.4;
    }

    .corrupted {
        color: #ff00ff;
        text-decoration: line-through;
        background: rgba(255, 0, 255, 0.1);
        padding: 0 10px;
    }

    .drag-hint {
        margin-top: 100px;
        display: flex;
        align-items: center;
        gap: 20px;
        font-size: 32px;
        font-weight: 700;
        color: #00ffff;
        text-shadow: 0 0 10px #00ffff;
    }

    .hand {
        font-size: 50px;
        animation: swing 2s infinite ease-in-out;
    }

    @keyframes swing {

        0%,
        100% {
            transform: translateX(0);
        }

        50% {
            transform: translateX(30px);
        }
    }
</style>

<div class="slide-wrapper">
    <div class="bg-gradient"></div>
    <div class="noise"></div>

    <h2 class="title">O cursinho<br>tradicional<br>te odeia.</h2>

    <div class="matrix-content">
        <div class="broken-card">
            <p class="card-text">O sistema se alimenta do seu cansaço.</p>
        </div>
        <div class="broken-card">
            <p class="card-text">Seu cérebro aprende resolvendo problemas.</p>
        </div>
        <div class="broken-card" style="border-color: #ff00ff;">
            <p class="card-text">Você aprende <span class="corrupted">PINTANDO PDF.</span></p>
        </div>
    </div>

    <div class="drag-hint">
        <div class="hand">👉</div>
        SAIA DO MATRIX
    </div>
</div>

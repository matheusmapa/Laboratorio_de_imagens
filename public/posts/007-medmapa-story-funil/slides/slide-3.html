<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    .slide-wrapper {
        width: 1080px;
        height: 1920px;
        background: #080b14;
        font-family: 'Inter', sans-serif;
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 150px 80px;
        box-sizing: border-box;
        color: white;
        overflow: hidden;
    }

    .glow-green {
        position: absolute;
        bottom: 10%;
        left: 50%;
        transform: translate(-50%, 0);
        width: 1400px;
        height: 1400px;
        background: radial-gradient(circle, rgba(16, 185, 129, 0.1) 0%, transparent 60%);
        pointer-events: none;
        z-index: 0;
    }

    .top-bar {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 15px;
        z-index: 10;
        margin-bottom: 300px;
    }

    .logo-box {
        display: flex;
        align-items: center;
        gap: 12px;
        font-weight: 900;
        font-size: 36px;
        letter-spacing: -1px;
    }

    .logo-box svg {
        color: #60a5fa;
        filter: drop-shadow(0 0 10px rgba(59, 130, 246, 0.5));
    }

    .headline {
        font-size: 72px;
        font-weight: 900;
        text-align: center;
        line-height: 1.15;
        letter-spacing: -3px;
        margin-bottom: 150px;
        z-index: 1;
    }

    .offer-area {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        z-index: 5;
        margin-bottom: 250px;
    }

    .price {
        font-size: 180px;
        font-weight: 950;
        line-height: 1;
        letter-spacing: -10px;
        text-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
    }

    .plan-detail {
        font-size: 32px;
        color: #94a3b8;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 2px;
    }

    /* Fake Link Sticker */
    .link-sticker {
        background: #fff;
        padding: 40px 80px;
        border-radius: 100px;
        display: flex;
        align-items: center;
        gap: 20px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        position: relative;
        z-index: 10;
    }

    .link-text {
        color: #3b82f6;
        font-size: 48px;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .cta-hint {
        position: absolute;
        top: -120px;
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
        gap: 10px;
    }

    .cta-hint span {
        font-size: 28px;
        font-weight: 800;
        color: #10b981;
        letter-spacing: 2px;
    }

    .arrow {
        font-size: 50px;
        animation: bounce 1.5s infinite;
    }

    @keyframes bounce {

        0%,
        100% {
            transform: translateY(0);
        }

        50% {
            transform: translateY(20px);
        }
    }
</style>

<div class="slide-wrapper">
    <div class="glow-green"></div>

    <div class="top-bar">
        <div class="logo-box">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 3 2 6v15l7-3 6 3 7-3V3l-7 3-6-3z" />
                <path d="M9 3v15" />
                <path d="M15 6v15" />
            </svg>
            MedMapa
        </div>
    </div>

    <div class="headline">Sua rota pro R1 não precisa ser no escuro.</div>

    <div class="offer-area">
        <div class="price">R$ 19,90</div>
        <div class="plan-detail">Plano Mensal • Plataforma Completa</div>
    </div>

    <div class="link-sticker">
        <div class="cta-hint">
            <span>TOQUE AQUI PARA ASSINAR</span>
            <div class="arrow">👇</div>
        </div>
        <svg width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="3.5"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71" />
            <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71" />
        </svg>
        <span class="link-text">medmapa.com.br</span>
    </div>
</div>

<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    .slide-wrapper {
        width: 1080px;
        height: 1920px;
        background: #080b14;
        font-family: 'Inter', sans-serif;
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 150px 80px;
        box-sizing: border-box;
        color: white;
        overflow: hidden;
    }

    /* Red Glow at eye level */
    .glow {
        position: absolute;
        top: 40%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 1200px;
        height: 1200px;
        background: radial-gradient(circle, rgba(239, 68, 68, 0.1) 0%, transparent 60%);
        pointer-events: none;
        z-index: 0;
    }

    .top-bar {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 15px;
        z-index: 10;
        margin-bottom: 200px;
    }

    .logo-box {
        display: flex;
        align-items: center;
        gap: 12px;
        font-weight: 900;
        font-size: 36px;
        letter-spacing: -1px;
    }

    .logo-box svg {
        color: #60a5fa;
        filter: drop-shadow(0 0 10px rgba(59, 130, 246, 0.5));
    }

    .headline {
        font-size: 82px;
        font-weight: 900;
        text-align: center;
        line-height: 1.1;
        letter-spacing: -3px;
        margin-bottom: 120px;
        z-index: 1;
        max-width: 900px;
        text-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    /* Fake Poll Sticker */
    .poll-sticker {
        width: 800px;
        background: rgba(255, 255, 255, 0.95);
        border-radius: 40px;
        padding: 40px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 30px;
        box-shadow: 0 40px 100px rgba(0, 0, 0, 0.6);
        z-index: 5;
    }

    .poll-question {
        color: #1a1a1a;
        font-size: 34px;
        font-weight: 800;
        text-align: center;
        margin-bottom: 10px;
    }

    .poll-options {
        display: flex;
        width: 100%;
        gap: 20px;
    }

    .option {
        flex: 1;
        background: #fff;
        border: 2px solid #f0f0f0;
        border-radius: 24px;
        padding: 40px 20px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 38px;
        font-weight: 800;
        color: #1a1a1a;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
    }

    .poll-sticker::before {
        content: 'RESPOSTA';
        position: absolute;
        top: -20px;
        background: #3b82f6;
        color: white;
        padding: 8px 20px;
        border-radius: 100px;
        font-size: 18px;
        font-weight: 900;
        letter-spacing: 1px;
    }
</style>

<div class="slide-wrapper">
    <div class="glow"></div>

    <div class="top-bar">
        <div class="logo-box">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 3 2 6v15l7-3 6 3 7-3V3l-7 3-6-3z" />
                <path d="M9 3v15" />
                <path d="M15 6v15" />
            </svg>
            MedMapa
        </div>
    </div>

    <h1 class="headline">Seja sincero: quantas vezes você já errou a mesma bobeira no plantão porque deu branco?</h1>

    <div class="poll-sticker">
        <div class="poll-options">
            <div class="option">Direto 🤡</div>
            <div class="option">Raramente 🤓</div>
        </div>
    </div>
</div>

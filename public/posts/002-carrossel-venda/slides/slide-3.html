<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    .slide {
        width: 1080px;
        height: 1350px;
        background: #030612;
        font-family: 'Inter', sans-serif;
        position: relative;
        padding: 100px 40px;
        display: flex;
        flex-direction: column;
        box-sizing: border-box;
        color: white;
        overflow: hidden;
    }

    .slide::before {
        content: '';
        position: absolute;
        top: -20%;
        left: -20%;
        width: 140%;
        height: 140%;
        background: radial-gradient(circle at 50% 30%, rgba(59, 130, 246, 0.1) 0%, transparent 60%);
        pointer-events: none;
        z-index: 0;
    }

    .slide>* {
        z-index: 1;
    }

    .logo-area {
        display: flex;
        align-items: center;
        gap: 16px;
        font-size: 38px;
        font-weight: 800;
        letter-spacing: -1px;
        color: #fff;
    }

    .main-content {
        display: flex;
        flex-direction: column;
        justify-content: center;
        flex: 1;
        width: 100%;
    }

    .h2-title {
        font-size: 84px;
        font-weight: 900;
        line-height: 1.05;
        letter-spacing: -3px;
        margin-top: 0;
        margin-bottom: 60px;
    }

    .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 24px;
        width: 100%;
    }

    .card {
        background: #0b1329;
        background: linear-gradient(180deg, rgba(16, 26, 48, 0.4) 0%, rgba(10, 16, 32, 0.4) 100%);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 36px;
        padding: 40px 30px;
        display: flex;
        flex-direction: column;
        width: 100%;
        box-sizing: border-box;
    }

    .icon-box {
        width: 64px;
        height: 64px;
        background: #1e293b;
        border-radius: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 32px;
    }

    .card-title {
        font-size: 38px;
        font-weight: 800;
        line-height: 1.2;
        margin-bottom: 12px;
        letter-spacing: -1px;
    }

    .card-desc {
        font-size: 22px;
        color: #64748b;
        font-weight: 500;
    }

    .footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: auto;
    }

    .progress-bar {
        display: flex;
        gap: 12px;
    }

    .dash {
        width: 38px;
        height: 6px;
        border-radius: 3px;
        background: rgba(255, 255, 255, 0.15);
    }

    .dash.active {
        background: #3b82f6;
    }

    .swipe-hint {
        font-size: 22px;
        color: #64748b;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 10px;
    }
</style>

<div class="slide">
    <div class="logo-area">
        <svg width="42" height="42" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 3 2 6v15l7-3 6 3 7-3V3l-7 3-6-3z" />
            <path d="M9 3v15" />
            <path d="M15 6v15" />
        </svg>
        MedMapa
    </div>

    <div class="main-content">
        <h2 class="h2-title">Tudo num único ecossistema.</h2>

        <div class="grid">
            <div class="card">
                <div class="icon-box">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
                    </svg>
                </div>
                <div class="card-title">Questões<br>Comentadas</div>
                <div class="card-desc">Múltipla escolha focada.</div>
            </div>
            <div class="card">
                <div class="icon-box">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect width="18" height="18" x="3" y="3" rx="2" ry="2" />
                        <line x1="3" x2="21" y1="9" y2="9" />
                        <path d="M9 21V9" />
                    </svg>
                </div>
                <div class="card-title">Flashcards<br>Inteligentes</div>
                <div class="card-desc">O segredo da retenção.</div>
            </div>
            <div class="card">
                <div class="icon-box">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 3v18h18" />
                        <path d="m19 9-5 5-4-4-3 3" />
                    </svg>
                </div>
                <div class="card-title">Métricas de<br>Desempenho</div>
                <div class="card-desc">Pare de chutar no escuro.</div>
            </div>
            <div class="card">
                <div class="icon-box">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 12h-4l-3 9L9 3l-3 9H2" />
                    </svg>
                </div>
                <div class="card-title">Simulados<br>Adaptáveis</div>
                <div class="card-desc">Treino é treino, jogo é jogo.</div>
            </div>
        </div>
    </div>

    <div class="footer">
        <div class="progress-bar">
            <div class="dash"></div>
            <div class="dash"></div>
            <div class="dash active"></div>
            <div class="dash"></div>
            <div class="dash"></div>
            <div class="dash"></div>
            <div class="dash"></div>
        </div>
        <div class="swipe-hint">Arrasta pro lado ➔</div>
    </div>
</div>

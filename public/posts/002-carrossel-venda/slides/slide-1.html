<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    .slide {
        width: 1080px;
        height: 1350px;
        background: #030612;
        font-family: 'Inter', sans-serif;
        position: relative;
        padding: 100px 80px;
        display: flex;
        flex-direction: column;
        box-sizing: border-box;
        color: white;
        overflow: hidden;
    }

    .slide::before {
        content: '';
        position: absolute;
        top: -20%;
        left: -20%;
        width: 140%;
        height: 140%;
        background: radial-gradient(circle at 50% 30%, rgba(59, 130, 246, 0.08) 0%, transparent 60%);
        pointer-events: none;
        z-index: 0;
    }

    .slide>* {
        z-index: 1;
    }

    .logo-area {
        display: flex;
        align-items: center;
        gap: 16px;
        font-size: 38px;
        font-weight: 800;
        letter-spacing: -1px;
        color: #fff;
    }

    .tag-pill {
        margin-top: auto;
        align-self: flex-start;
        padding: 12px 28px;
        border-radius: 100px;
        border: 1px solid rgba(59, 130, 246, 0.4);
        color: #4e8ff7;
        font-size: 20px;
        font-weight: 700;
        margin-bottom: 32px;
    }

    .h1-title {
        font-size: 115px;
        font-weight: 900;
        line-height: 1.05;
        letter-spacing: -4px;
        margin-bottom: 32px;
        margin-top: 0;
        text-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }

    .h1-highlight {
        color: #3b82f6;
        background: linear-gradient(90deg, #60a5fa 0%, #3b82f6 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        filter: drop-shadow(0 0 20px rgba(59, 130, 246, 0.15));
    }

    .subtitle {
        font-size: 34px;
        color: #94a3b8;
        font-weight: 400;
        line-height: 1.4;
        max-width: 850px;
        margin-bottom: auto;
        margin-top: 0;
    }

    .footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: auto;
    }

    .progress-bar {
        display: flex;
        gap: 12px;
    }

    .dash {
        width: 38px;
        height: 6px;
        border-radius: 3px;
        background: rgba(255, 255, 255, 0.15);
    }

    .dash.active {
        background: #3b82f6;
    }

    .swipe-hint {
        font-size: 22px;
        color: #64748b;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 10px;
    }
</style>

<div class="slide">
    <div class="logo-area">
        <svg width="42" height="42" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"

            <path d="M9 3 2 6v15l7-3 6 3 7-3V3l-7 3-6-3z" />
            <path d="M9 3v15" />

        </svg>
        MedMapa
    </div>

    <div class="tag-pill">A evolução do estudo médico</div>

<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    .slide {
        width: 1080px;
        height: 1350px;
        background: radial-gradient(120% 120% at 50% -20%, #0b152d 0%, #030612 100%);
        font-family: 'Inter', sans-serif;
        position: relative;
        padding: 90px 80px;
        display: flex;
        flex-direction: column;
        align-items: center;
        box-sizing: border-box;
        color: white;
    }

    .logo-area {
        display: flex;
        align-items: center;
        gap: 16px;
        font-size: 38px;
        font-weight: 800;
        letter-spacing: -1px;
        color: #fff;
        align-self: flex-start;
    }

    .main-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        flex: 1;
        width: 100%;
        margin-top: -30px;
        /* Slight optical adjustment upwards */
    }

    .center-icon {
        margin-bottom: 20px;
        color: #fff;
    }

    .h2-title {
        font-size: 80px;
        font-weight: 900;
        line-height: 1.05;
        letter-spacing: -3px;
        text-align: center;
        margin-top: 0;
        margin-bottom: 40px;
    }

    .h2-title .blue {
        color: #3b82f6;
    }

    .cta-box {
        background: #0b1329;
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 40px;
        padding: 50px 80px;
        display: flex;
        flex-direction: column;
        align-items: center;
        box-shadow: 0 40px 60px -20px rgba(0, 0, 0, 0.5);
        width: 760px;
    }

    .price-row {
        display: flex;
        align-items: baseline;
        justify-content: center;
        gap: 8px;
        margin-bottom: 12px;
        width: 100%;
    }

    .currency {
        font-size: 72px;
        font-weight: 900;
        width: 120px;
        text-align: right;
    }

    .price-big {
        font-size: 130px;
        font-weight: 900;
        line-height: 1;
        letter-spacing: -4px;
        text-align: center;
    }

    .price-small {
        font-size: 52px;
        font-weight: 800;
        color: #94a3b8;
        width: 120px;
        text-align: left;
    }

    .plan-desc {
        font-size: 28px;
        color: #cbd5e1;
        font-weight: 500;
    }

    .guarantee-btn {
        display: flex;
        align-items: center;
        gap: 12px;
        background: rgba(16, 185, 129, 0.1);
        border: 1px solid rgba(16, 185, 129, 0.2);
        padding: 20px 40px;
        border-radius: 100px;
        color: #34d399;
        font-size: 24px;
        font-weight: 700;
        margin-top: 30px;
    }

    .bio-link {
        font-size: 20px;
        color: #64748b;
        font-weight: 500;
        margin-top: 24px;
    }

    .footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: auto;
        width: 100%;
    }

    .progress-bar {
        display: flex;
        gap: 12px;
    }

    .dash {
        width: 38px;
        height: 6px;
        border-radius: 3px;
        background: rgba(255, 255, 255, 0.15);
    }

    .dash.active {
        background: #3b82f6;
    }

    .website {
        font-size: 22px;
        color: #3b82f6;
        font-weight: 700;
    }
</style>

<div class="slide">
    <div class="logo-area">
        <svg width="42" height="42" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 3 2 6v15l7-3 6 3 7-3V3l-7 3-6-3z" />
            <path d="M9 3v15" />
            <path d="M15 6v15" />
        </svg>
        MedMapa
    </div>

    <div class="main-content">
        <div class="center-icon">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 3 2 6v15l7-3 6 3 7-3V3l-7 3-6-3z" />
                <path d="M9 3v15" />
                <path d="M15 6v15" />
            </svg>
        </div>

        <h2 class="h2-title">Sua jornada para a<br>aprovação <span class="blue">começa aqui.</span></h2>

        <div class="cta-box">
            <div class="price-row">
                <span class="currency">R$</span>
                <span class="price-big">19</span>
                <span class="price-small">,90</span>
            </div>
            <div class="plan-desc">Plano Mensal • Plataforma Completa</div>
        </div>

        <div class="guarantee-btn">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
                <path d="m9 12 2 2 4-4" />
            </svg>
            Garantia Incondicional de 7 Dias
        </div>

        <div class="bio-link">↑ Toque no link da bio para começar agora</div>
    </div>

    <div class="footer">
        <div class="progress-bar">
            <div class="dash"></div>
            <div class="dash"></div>
            <div class="dash"></div>
            <div class="dash"></div>
            <div class="dash"></div>
            <div class="dash"></div>
            <div class="dash active"></div>
        </div>
        <div class="website">medmapa.com.br</div>
    </div>
</div>

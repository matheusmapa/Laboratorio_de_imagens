<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador — Laboratório de Imagens</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --shell-bg: #09090b;
            --shell-surface: #18181b;
            --shell-border: rgba(255, 255, 255, 0.08);
            --shell-text: #fafafa;
            --shell-muted: #71717a;
            --accent: #8b5cf6;
            --accent-dim: rgba(139, 92, 246, 0.15);
            --font: 'Inter', -apple-system, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: var(--font);
            background: var(--shell-bg);
            color: var(--shell-text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 32px 24px 80px;
        }

        /* Top Nav */
        .viewer-nav {
            width: 100%;
            max-width: 900px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--shell-muted);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: color 0.2s;
            padding: 8px 16px;
            border-radius: 10px;
            border: 1px solid transparent;
        }

        .back-link:hover {
            color: var(--shell-text);
            border-color: var(--shell-border);
            background: var(--shell-surface);
        }

        .viewer-title {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        /* Carousel Container */
        .carousel-container {
            width: 100%;
            max-width: 900px;
            display: none;
            /* Hidden until loaded */
        }

        .carousel-viewport {
            position: relative;
        }

        .carousel-overflow {
            overflow: hidden;
            border-radius: 16px;
            border: 1px solid var(--shell-border);
            background: #000;
        }

        .carousel-track {
            display: flex;
            transition: transform 0.5s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .slide-wrapper {
            flex: 0 0 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            min-height: 500px;
        }

        .post-frame {
            position: relative;
            overflow: hidden;
            border-radius: 8px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            background: #000;
            /* Default background */
        }

        .post-canvas {
            transform-origin: top left;
            position: absolute;
            top: 0;
            left: 0;
            overflow: hidden;
        }

        /* Nav buttons */
        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 1px solid var(--shell-border);
            background: rgba(9, 9, 11, 0.8);
            backdrop-filter: blur(12px);
            color: var(--shell-text);
            font-size: 20px;
            cursor: pointer;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .nav-btn:hover:not(:disabled) {
            background: var(--accent-dim);
            border-color: var(--accent);
            color: var(--accent);
        }

        .nav-btn:disabled {
            opacity: 0;
            pointer-events: none;
        }

        .nav-btn.prev {
            left: -56px;
        }

        .nav-btn.next {
            right: -56px;
        }

        /* Dots */
        .dots {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-top: 24px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            cursor: pointer;
            transition: all 0.3s;
        }

        .dot.active {
            background: var(--accent);
            width: 28px;
            border-radius: 4px;
        }

        /* Action Bar */
        .action-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 32px;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px 28px;
            border-radius: 12px;
            font-family: var(--font);
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 4px 16px rgba(139, 92, 246, 0.3);
        }

        .btn-primary:hover {
            background: #7c3aed;
            box-shadow: 0 8px 24px rgba(139, 92, 246, 0.4);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: var(--shell-surface);
            color: var(--shell-text);
            border: 1px solid var(--shell-border);
        }

        .btn-secondary:hover {
            background: var(--accent-dim);
            border-color: rgba(139, 92, 246, 0.3);
            color: var(--accent);
        }

        .btn:disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        .btn .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            display: none;
        }

        .btn.loading .spinner {
            display: block;
        }

        .btn.loading .btn-label {
            display: none;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Loader & Error states */
        .loader {
            margin-top: 100px;
            text-align: center;
            color: var(--shell-muted);
        }

        .loader .spinner {
            width: 32px;
            height: 32px;
            margin: 0 auto 16px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .error-message {
            margin-top: 100px;
            text-align: center;
            color: #ef4444;
            display: none;
            max-width: 400px;
            background: rgba(239, 68, 68, 0.1);
            padding: 24px;
            border-radius: 12px;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        /* Export status */
        .export-status {
            text-align: center;
            margin-top: 12px;
            font-size: 13px;
            font-weight: 500;
            color: var(--shell-muted);
            min-height: 20px;
        }

        @media (max-width: 1000px) {
            .nav-btn.prev {
                left: 8px;
            }

            .nav-btn.next {
                right: 8px;
            }
        }

        @media (max-width: 600px) {
            body {
                padding: 16px 12px 60px;
            }

            .slide-wrapper {
                padding: 12px;
            }

            .action-bar {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <nav class="viewer-nav">
        <a href="/" class="back-link">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 12H5" />
                <polyline points="12 19 5 12 12 5" />
            </svg>
            Galeria
        </a>
        <span class="viewer-title" id="top-title">Carregando...</span>
    </nav>

    <div class="loader" id="loader">
        <div class="spinner"></div>
        <p>Carregando post...</p>
    </div>

    <div class="error-message" id="error-msg"></div>

    <div class="carousel-container" id="carousel">
        <div class="carousel-viewport">
            <button class="nav-btn prev" id="btn-prev" aria-label="Slide anterior">‹</button>
            <button class="nav-btn next" id="btn-next" aria-label="Próximo slide">›</button>

            <div class="carousel-overflow">
                <div class="carousel-track" id="track">
                    <!-- Slides are injected here dynamically -->
                </div>
            </div>

            <div class="dots" id="dots"></div>
        </div>

        <div class="action-bar">
            <button class="btn btn-primary" id="btn-download-current">
                <span class="spinner"></span>
                <span class="btn-label">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                        <polyline points="7 10 12 15 17 10" />
                        <line x1="12" y1="15" x2="12" y2="3" />
                    </svg>
                    Baixar Slide Atual
                </span>
            </button>
            <button class="btn btn-secondary" id="btn-download-all">
                <span class="spinner"></span>
                <span class="btn-label">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                        <polyline points="7 10 12 15 17 10" />
                        <line x1="12" y1="15" x2="12" y2="3" />
                    </svg>
                    Baixar Todos (PNG)
                </span>
            </button>
        </div>
        <div class="export-status" id="export-status"></div>
    </div>

    <!-- Container invisível para os estilos injetados via AJAX -->
    <div id="styles-container"></div>

    <script>
        // ─── STATE ──────────────────────────────────
        let POST_ID = '';
        let config = null;
        let currentSlide = 0;
        let TOTAL_SLIDES = 0;
        let CANVAS_W = 1080;
        let CANVAS_H = 1350;

        // ─── INIT ───────────────────────────────────
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            POST_ID = urlParams.get('post');

            if (!POST_ID) {
                showError("ID do post não fornecido na URL (?post=xxx)");
                return;
            }

            try {
                // 1. Fetch post metadata
                const metaRes = await fetch(`/posts/${POST_ID}/post.json`);
                if (!metaRes.ok) throw new Error("post.json não encontrado");
                config = await metaRes.json();

                // 2. Setup config variables
                document.getElementById('top-title').textContent = config.title;
                TOTAL_SLIDES = config.slides;
                const [w, h] = config.format.split('x').map(Number);
                if (w && h) {
                    CANVAS_W = w;
                    CANVAS_H = h;
                }

                // 3. Build skeleton
                buildCarouselSkeleton();

                // 4. Load slide content dynamically
                await loadSlidesConcurrently();

                // 5. Initialize UI
                document.getElementById('loader').style.display = 'none';
                document.getElementById('carousel').style.display = 'block';

                initInteraction();
                scaleAllCanvases();
                window.addEventListener('resize', scaleAllCanvases);

            } catch (err) {
                console.error(err);
                showError(`Falha ao carregar o post '${POST_ID}': ${err.message}`);
            }
        });

        function showError(msg) {
            document.getElementById('loader').style.display = 'none';
            const errEl = document.getElementById('error-msg');
            errEl.style.display = 'block';
            errEl.textContent = msg;
        }

        // ─── BUILD PIPELINE ─────────────────────────
        function buildCarouselSkeleton() {
            const track = document.getElementById('track');
            const dotsEl = document.getElementById('dots');

            for (let i = 1; i <= TOTAL_SLIDES; i++) {
                // Skeletons base para onde o HTML injetado vai residir
                const wrapper = document.createElement('div');
                wrapper.className = 'slide-wrapper';
                wrapper.innerHTML = `
                    <div class="post-frame" id="frame-${i}" style="width:${CANVAS_W}px; height:${CANVAS_H}px; transform-origin: top left;">
                        <div class="post-canvas" id="canvas-${i}" style="width:${CANVAS_W}px; height:${CANVAS_H}px;">
                            <!-- Content loaded here -->
                        </div>
                    </div>
                `;
                track.appendChild(wrapper);

                // Dots
                const dot = document.createElement('div');
                dot.className = 'dot' + (i === 1 ? ' active' : '');
                dot.onclick = () => goTo(i - 1);
                dotsEl.appendChild(dot);
            }
        }

        async function loadSlidesConcurrently() {
            const promises = Array.from({ length: TOTAL_SLIDES }, async (_, idx) => {
                const num = idx + 1;
                try {
                    const res = await fetch(`/posts/${POST_ID}/slides/slide-${num}.html`);
                    if (!res.ok) throw new Error('Not found');
                    const text = await res.text();

                    // Usar Shadow DOM para isolar 100% o CSS e evitar vazamentos entre slides
                    const canvas = document.getElementById(`canvas-${num}`);
                    const shadow = canvas.attachShadow({ mode: 'open' });
                    shadow.innerHTML = text;
                } catch (err) {
                    document.getElementById(`canvas-${num}`).innerHTML =
                        `<div style="color:red; padding:40px;">Erro ao carregar slide ${num}:<br>${err.message}</div>`;
                }
            });

            await Promise.all(promises);
        }

        // ─── INTERACTION ────────────────────────────
        function initInteraction() {
            document.getElementById('btn-prev').onclick = () => navigate(-1);
            document.getElementById('btn-next').onclick = () => navigate(1);
            document.getElementById('btn-download-current').onclick = exportCurrentSlide;
            document.getElementById('btn-download-all').onclick = exportAllSlides;

            document.addEventListener('keydown', e => {
                if (e.key === 'ArrowLeft') navigate(-1);
                if (e.key === 'ArrowRight') navigate(1);
            });
            updateUI();
        }

        function scaleAllCanvases() {
            for (let i = 1; i <= TOTAL_SLIDES; i++) {
                const frame = document.getElementById(`frame-${i}`);
                const canvas = document.getElementById(`canvas-${i}`);
                if (!frame || !canvas) continue;

                // Viewport available size
                const viewport = document.querySelector('.carousel-overflow');
                const vw = viewport.clientWidth - 48; // padding
                const vh = window.innerHeight * 0.65;

                // Scale to fit
                const scaleX = vw / CANVAS_W;
                const scaleY = vh / CANVAS_H;
                const scale = Math.min(scaleX, scaleY, 0.55);

                canvas.style.transform = `scale(${scale})`;
                frame.style.width = `${CANVAS_W * scale}px`;
                frame.style.height = `${CANVAS_H * scale}px`;
            }
        }

        function navigate(dir) {
            goTo(Math.max(0, Math.min(TOTAL_SLIDES - 1, currentSlide + dir)));
        }

        function goTo(index) {
            currentSlide = index;
            updateUI();
        }

        function updateUI() {
            document.getElementById('track').style.transform = `translateX(-${currentSlide * 100}%)`;
            document.getElementById('btn-prev').disabled = currentSlide === 0;
            document.getElementById('btn-next').disabled = currentSlide === TOTAL_SLIDES - 1;

            document.querySelectorAll('.dot').forEach((dot, i) => {
                dot.className = 'dot' + (i === currentSlide ? ' active' : '');
            });
        }

        // ─── EXPORT ─────────────────────────────────
        async function downloadSlide(slideNum) {
            // Note that post parameter is the directory ID, not HTML file
            const url = `/api/screenshot?post=${encodeURIComponent(POST_ID)}&slide=${slideNum}&w=${CANVAS_W}&h=${CANVAS_H}`;

            const response = await fetch(url);
            if (!response.ok) {
                const err = await response.json().catch(() => ({ error: 'Erro desconhecido' }));
                throw new Error(err.error || `HTTP ${response.status}`);
            }

            const blob = await response.blob();
            const blobUrl = URL.createObjectURL(blob);

            const link = document.createElement('a');
            link.download = `${POST_ID}-slide-${String(slideNum).padStart(2, '0')}.png`;
            link.href = blobUrl;
            link.click();

            URL.revokeObjectURL(blobUrl);
        }

        async function exportCurrentSlide() {
            const btn = document.getElementById('btn-download-current');
            const status = document.getElementById('export-status');

            btn.classList.add('loading');
            btn.disabled = true;
            status.textContent = 'Renderizando imagem em alta resolução...';
            status.style.color = '#71717a';

            try {
                await downloadSlide(currentSlide + 1);
                status.textContent = '✅ Download iniciado!';
                status.style.color = '#22c55e';
            } catch (err) {
                console.error('Export error:', err);
                status.textContent = '❌ Erro ao gerar imagem. Veja o console.';
                status.style.color = '#ef4444';
            } finally {
                btn.classList.remove('loading');
                btn.disabled = false;
                setTimeout(() => { status.textContent = ''; }, 4000);
            }
        }

        async function exportAllSlides() {
            const btn = document.getElementById('btn-download-all');
            const status = document.getElementById('export-status');

            btn.classList.add('loading');
            btn.disabled = true;

            try {
                for (let i = 1; i <= TOTAL_SLIDES; i++) {
                    status.textContent = `Renderizando slide ${i} de ${TOTAL_SLIDES}...`;
                    status.style.color = '#71717a';
                    await downloadSlide(i);
                    await new Promise(r => setTimeout(r, 300));
                }
                status.textContent = `✅ Todos os ${TOTAL_SLIDES} slides baixados!`;
                status.style.color = '#22c55e';
            } catch (err) {
                console.error('Export all error:', err);
                status.textContent = '❌ Erro ao gerar imagens. Veja o console.';
                status.style.color = '#ef4444';
            } finally {
                btn.classList.remove('loading');
                btn.disabled = false;
                setTimeout(() => { status.textContent = ''; }, 4000);
            }
        }
    </script>
</body>

</html>

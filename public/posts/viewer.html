<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador — Laboratório de Imagens</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --shell-bg: #09090b;
            --shell-surface: #18181b;
            --shell-border: rgba(255, 255, 255, 0.08);
            --shell-text: #fafafa;
            --shell-muted: #71717a;
            --accent: #8b5cf6;
            --accent-dim: rgba(139, 92, 246, 0.15);
            --font: 'Inter', -apple-system, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: var(--font);
            background: var(--shell-bg);
            color: var(--shell-text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 32px 24px 80px;
        }

        /* Top Nav */
        .viewer-nav {
            width: 100%;
            max-width: 900px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--shell-muted);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: color 0.2s;
            padding: 8px 16px;
            border-radius: 10px;
            border: 1px solid transparent;
        }

        .back-link:hover {
            color: var(--shell-text);
            border-color: var(--shell-border);
            background: var(--shell-surface);
        }

        .viewer-title {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        /* Carousel Container */
        .carousel-container {
            width: 100%;
            max-width: 900px;
            display: none;
            /* Hidden until loaded */
        }

        .carousel-viewport {
            position: relative;
        }

        .carousel-overflow {
            overflow: hidden;
            border-radius: 16px;
            border: 1px solid var(--shell-border);
            background: #000;
        }

        .carousel-track {
            display: flex;
            transition: transform 0.5s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .slide-wrapper {
            flex: 0 0 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            min-height: 500px;
        }

        .post-frame {
            position: relative;
            overflow: hidden;
            border-radius: 8px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            background: #000;
            /* Default background */
        }

        .post-canvas {
            transform-origin: top left;
            position: absolute;
            top: 0;
            left: 0;
            overflow: hidden;
        }

        /* Nav buttons */
        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 1px solid var(--shell-border);
            background: rgba(9, 9, 11, 0.8);
            backdrop-filter: blur(12px);
            color: var(--shell-text);
            font-size: 20px;
            cursor: pointer;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .nav-btn:hover:not(:disabled) {
            background: var(--accent-dim);
            border-color: var(--accent);
            color: var(--accent);
        }

        .nav-btn:disabled {
            opacity: 0;
            pointer-events: none;
        }

        .nav-btn.prev {
            left: -56px;
        }

        .nav-btn.next {
            right: -56px;
        }

        /* Dots */
        .dots {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-top: 24px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            cursor: pointer;
            transition: all 0.3s;
        }

        .dot.active {
            background: var(--accent);
            width: 28px;
            border-radius: 4px;
        }

        /* Action Bar */
        .action-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 32px;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px 28px;
            border-radius: 12px;
            font-family: var(--font);
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 4px 16px rgba(139, 92, 246, 0.3);
        }

        .btn-primary:hover {
            background: #7c3aed;
            box-shadow: 0 8px 24px rgba(139, 92, 246, 0.4);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: var(--shell-surface);
            color: var(--shell-text);
            border: 1px solid var(--shell-border);
        }

        .btn-secondary:hover {
            background: var(--accent-dim);
            border-color: rgba(139, 92, 246, 0.3);
            color: var(--accent);
        }

        .btn:disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        .btn .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            display: none;
        }

        .btn.loading .spinner {
            display: block;
        }

        .btn.loading .btn-label {
            display: none;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Loader & Error states */
        .loader {
            margin-top: 100px;
            text-align: center;
            color: var(--shell-muted);
        }

        .loader .spinner {
            width: 32px;
            height: 32px;
            margin: 0 auto 16px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .error-message {
            margin-top: 100px;
            text-align: center;
            color: #ef4444;
            display: none;
            max-width: 400px;
            background: rgba(239, 68, 68, 0.1);
            padding: 24px;
            border-radius: 12px;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        /* Export status */
        .export-status {
            text-align: center;
            margin-top: 12px;
            font-size: 13px;
            font-weight: 500;
            color: var(--shell-muted);
            min-height: 20px;
        }

        @media (max-width: 1000px) {
            .nav-btn.prev {
                left: 8px;
            }

            .nav-btn.next {
                right: 8px;
            }
        }

        /* Editor Sidebar */
        .editor-sidebar {
            position: fixed;
            top: 0;
            right: -350px;
            width: 320px;
            height: 100vh;
            background: rgba(9, 9, 11, 0.95);
            backdrop-filter: blur(20px);
            border-left: 1px solid var(--shell-border);
            transition: right 0.3s cubic-bezier(0.22, 1, 0.36, 1);
            z-index: 100;
            display: flex;
            flex-direction: column;
            box-shadow: -10px 0 40px rgba(0, 0, 0, 0.5);
        }

        .editor-sidebar.open {
            right: 0;
        }

        .editor-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--shell-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .editor-header h3 {
            font-size: 16px;
            font-weight: 600;
        }

        .editor-header button {
            background: none;
            border: none;
            color: var(--shell-muted);
            cursor: pointer;
            font-size: 18px;
        }

        .editor-header button:hover {
            color: #fff;
        }

        .editor-body {
            padding: 24px;
            flex: 1;
            overflow-y: auto;
        }

        .editor-hint {
            font-size: 13px;
            color: var(--shell-muted);
            background: var(--shell-surface);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            border: 1px solid var(--shell-border);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            color: var(--shell-muted);
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-group input[type="text"],
        .form-group textarea {
            width: 100%;
            background: var(--shell-surface);
            border: 1px solid var(--shell-border);
            color: #fff;
            padding: 10px 12px;
            border-radius: 8px;
            font-family: var(--font);
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: var(--accent);
        }

        .form-group textarea {
            resize: vertical;
        }

        /* Editing Outline inject */
        .live-editing-active * {
            cursor: crosshair !important;
            pointer-events: auto !important;
            user-select: none !important;
        }
        
        @media (max-width: 600px) {
            body {
                padding: 16px 12px 60px;
            }

            .slide-wrapper {
                padding: 12px;
            }

            .action-bar {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }

        .back-link:hover {
            color: white;
            opacity: 1;
        }

        /* --- Global Resize Overlay --- */
        #global-resize-overlay {
            position: fixed;
            display: none;
            border: 2px solid var(--accent);
            pointer-events: none;
            z-index: 99999;
        }
        .r-handle {
            position: absolute;
            width: 12px;
            height: 12px;
            background: #fff;
            border: 2px solid var(--accent);
            border-radius: 50%;
            pointer-events: auto;
        }
        .r-handle.nw { top: -6px; left: -6px; cursor: nwse-resize; }
        .r-handle.ne { top: -6px; right: -6px; cursor: nesw-resize; }
        .r-handle.sw { bottom: -6px; left: -6px; cursor: nesw-resize; }
        .r-handle.se { bottom: -6px; right: -6px; cursor: nwse-resize; }
        .r-handle.n { top: -6px; left: 50%; transform: translateX(-50%); cursor: ns-resize; }
        .r-handle.s { bottom: -6px; left: 50%; transform: translateX(-50%); cursor: ns-resize; }
        .r-handle.e { right: -6px; top: 50%; transform: translateY(-50%); cursor: ew-resize; }
        .r-handle.w { left: -6px; top: 50%; transform: translateY(-50%); cursor: ew-resize; }

    </style>
</head>

<body>
    <nav class="viewer-nav">
        <a href="/" class="back-link">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 12H5" />
                <polyline points="12 19 5 12 12 5" />
            </svg>
            Galeria
        </a>
        <span class="viewer-title" id="top-title">Carregando...</span>
    </nav>

    <div class="loader" id="loader">
        <div class="spinner"></div>
        <p>Carregando post...</p>
    </div>

    <div class="error-message" id="error-msg"></div>

    <div class="carousel-container" id="carousel">
        <div class="carousel-viewport">
            <button class="nav-btn prev" id="btn-prev" aria-label="Slide anterior">‹</button>
            <button class="nav-btn next" id="btn-next" aria-label="Próximo slide">›</button>

            <div class="carousel-overflow">
                <div class="carousel-track" id="track">
                    <!-- Slides are injected here dynamically -->
                </div>
            </div>

            <div class="dots" id="dots"></div>
        </div>

        <div class="action-bar">
            <button class="btn btn-secondary" id="btn-toggle-editor" style="border-color: var(--accent); color: var(--accent);">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
                </svg>
                Editor Automágico
            </button>
            <button class="btn btn-secondary" id="btn-toggle-move" style="display: none; border-color: #f59e0b; color: #f59e0b;" title="Alterna entre selecionar para editar vs clicar e arrastar livremente">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="5 9 2 12 5 15"></polyline><polyline points="9 5 12 2 15 5"></polyline><polyline points="19 9 22 12 19 15"></polyline><polyline points="9 19 12 22 15 19"></polyline><line x1="2" y1="12" x2="22" y2="12"></line><line x1="12" y1="2" x2="12" y2="22"></line>
                </svg>
                <span id="move-mode-label">Mover Livre: OFF</span>
            </button>
            <button class="btn btn-primary" id="btn-download-current">
                <span class="spinner"></span>
                <span class="btn-label">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                        <polyline points="7 10 12 15 17 10" />
                        <line x1="12" y1="15" x2="12" y2="3" />
                    </svg>
                    Baixar Slide Atual
                </span>
            </button>
            <button class="btn btn-secondary" id="btn-download-all">
                <span class="spinner"></span>
                <span class="btn-label">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                        <polyline points="7 10 12 15 17 10" />
                        <line x1="12" y1="15" x2="12" y2="3" />
                    </svg>
                    Baixar Todos (PNG)
                </span>
            </button>
        </div>
        <div class="export-status" id="export-status"></div>
    </div>

    <!-- Live Editor Sidebar -->
    <div class="editor-sidebar" id="editor-sidebar">
        <div class="editor-header">
            <h3>Inspetor Visual</h3>
            <button id="close-editor">✕</button>
        </div>
        <div class="editor-body">
            <p class="editor-hint" id="editor-hint">Passe o mouse na arte para selecionar.</p>
            <div id="prop-panels" style="display:none;">
                <div class="form-group">
                    <label>Editar Texto</label>
                    <textarea id="prop-text" rows="4"></textarea>
                </div>
                <div class="form-group">
                    <label>Cor do Texto</label>
                    <div style="display: flex; gap: 8px;">
                        <input type="color" id="prop-color-picker" style="width: 40px; height: 38px; padding: 0; background: none; border: 1px solid var(--shell-border); border-radius: 6px; cursor: pointer;">
                        <input type="text" id="prop-color" style="flex: 1;">
                    </div>
                </div>
                <div class="form-group">
                    <label>Tamanho (Fonte)</label>
                    <div style="display: flex; gap: 8px; align-items: center;">
                        <input type="range" id="prop-size" min="10" max="600" value="16" style="flex: 1;">
                        <span id="prop-size-display" style="font-size: 13px; color: var(--shell-muted); min-width: 45px; text-align: right;">16px</span>
                    </div>
                </div>
            </div>
            
            <div id="history-controls" style="display: flex; gap: 8px; margin-top: 20px; border-top: 1px solid var(--shell-border); padding-top: 16px;">
                 <button class="btn btn-secondary" id="btn-undo" style="flex: 1;" disabled title="Desfazer (Ctrl+Z)">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="transform: scaleX(-1);"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                    Desfazer
                 </button>
                 <button class="btn btn-secondary" id="btn-redo" style="flex: 1;" disabled title="Refazer (Ctrl+Y)">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                    Refazer
                 </button>
            </div>

            <div id="save-status" style="margin-top: 12px; font-size: 13px; color: #22c55e; display: none;">✅ Salvo no computador!</div>
            <div class="editor-footer">
                 <button class="btn btn-primary" id="btn-save-slide" style="width:100%; padding: 10px; margin-top: 12px;">Salvar no HD</button>
                 <p style="font-size: 12px; color: var(--shell-muted); margin-top: 8px; text-align: center;">Isso sobrescreve o arquivo HTML original.</p>
            </div>
        </div>
    </div>

    <!-- Container invisível para os estilos injetados via AJAX -->
    <div id="styles-container"></div>

    <!-- Bounding Box Overlay for Resizing Elements -->
    <div id="global-resize-overlay">
        <div class="r-handle nw" data-dir="nw"></div>
        <div class="r-handle ne" data-dir="ne"></div>
        <div class="r-handle sw" data-dir="sw"></div>
        <div class="r-handle se" data-dir="se"></div>
        <div class="r-handle n" data-dir="n"></div>
        <div class="r-handle s" data-dir="s"></div>
        <div class="r-handle e" data-dir="e"></div>
        <div class="r-handle w" data-dir="w"></div>
    </div>

    <script>
        // ─── STATE ──────────────────────────────────
        let POST_ID = '';
        let config = null;
        let currentSlide = 0;
        let TOTAL_SLIDES = 0;
        let CANVAS_W = 1080;
        let CANVAS_H = 1350;

        // ─── INIT ───────────────────────────────────
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            POST_ID = urlParams.get('post');

            if (!POST_ID) {
                showError("ID do post não fornecido na URL (?post=xxx)");
                return;
            }

            try {
                // 0. Resolve dynamic true path for the post due to nested folders
                const pathRes = await fetch('/api/resolve-path', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: POST_ID })
                });
                
                if (!pathRes.ok) throw new Error("A pasta física deste post não foi encontrada.");
                const { basePath } = await pathRes.json();

                // 1. Fetch post metadata
                const metaRes = await fetch(`${basePath}/post.json`);
                if (!metaRes.ok) throw new Error("post.json não encontrado");
                config = await metaRes.json();

                // 2. Setup config variables
                document.getElementById('top-title').textContent = config.title;
                TOTAL_SLIDES = config.slides;
                const [w, h] = config.format.split('x').map(Number);
                if (w && h) {
                    CANVAS_W = w;
                    CANVAS_H = h;
                }

                // 3. Build skeleton
                buildCarouselSkeleton();

                // 4. Load slide content dynamically
                await loadSlidesConcurrently(basePath);

                // 5. Initialize UI
                document.getElementById('loader').style.display = 'none';
                document.getElementById('carousel').style.display = 'block';

                initInteraction();
                scaleAllCanvases();
                window.addEventListener('resize', scaleAllCanvases);

            } catch (err) {
                console.error(err);
                showError(`Falha ao carregar o post '${POST_ID}': ${err.message}`);
            }
        });

        function showError(msg) {
            document.getElementById('loader').style.display = 'none';
            const errEl = document.getElementById('error-msg');
            errEl.style.display = 'block';
            errEl.textContent = msg;
        }

        // ─── BUILD PIPELINE ─────────────────────────
        function buildCarouselSkeleton() {
            const track = document.getElementById('track');
            const dotsEl = document.getElementById('dots');

            for (let i = 1; i <= TOTAL_SLIDES; i++) {
                // Skeletons base para onde o HTML injetado vai residir
                const wrapper = document.createElement('div');
                wrapper.className = 'slide-wrapper';
                wrapper.innerHTML = `
                    <div class="post-frame" id="frame-${i}" style="width:${CANVAS_W}px; height:${CANVAS_H}px; transform-origin: top left;">
                        <div class="post-canvas" id="canvas-${i}" style="width:${CANVAS_W}px; height:${CANVAS_H}px;">
                            <!-- Content loaded here -->
                        </div>
                    </div>
                `;
                track.appendChild(wrapper);

                // Dots
                const dot = document.createElement('div');
                dot.className = 'dot' + (i === 1 ? ' active' : '');
                dot.onclick = () => goTo(i - 1);
                dotsEl.appendChild(dot);
            }
        }

        async function loadSlidesConcurrently(basePath) {
            const promises = Array.from({ length: TOTAL_SLIDES }, async (_, idx) => {
                const num = idx + 1;
                try {
                    const res = await fetch(`${basePath}/slides/slide-${num}.html`);
                    if (!res.ok) throw new Error('Not found');
                    const text = await res.text();

                    // Usar Shadow DOM para isolar 100% o CSS e evitar vazamentos entre slides
                    const canvas = document.getElementById(`canvas-${num}`);
                    const shadow = canvas.attachShadow({ mode: 'open' });
                    shadow.innerHTML = text;
                } catch (err) {
                    document.getElementById(`canvas-${num}`).innerHTML =
                        `<div style="color:red; padding:40px;">Erro ao carregar slide ${num}:<br>${err.message}</div>`;
                }
            });

            await Promise.all(promises);
        }

        // ─── INTERACTION ────────────────────────────
        function initInteraction() {
            document.getElementById('btn-prev').onclick = () => navigate(-1);
            document.getElementById('btn-next').onclick = () => navigate(1);
            document.getElementById('btn-download-current').onclick = exportCurrentSlide;
            document.getElementById('btn-download-all').onclick = exportAllSlides;

            document.addEventListener('keydown', e => {
                if (e.key === 'ArrowLeft') navigate(-1);
                if (e.key === 'ArrowRight') navigate(1);
            });
            updateUI();
            initEditor();
        }

        // ... (Keep existing scale, navigate, goTo, updateUI, export methods unchanged until the end)

        function scaleAllCanvases() {
            for (let i = 1; i <= TOTAL_SLIDES; i++) {
                const frame = document.getElementById(`frame-${i}`);
                const canvas = document.getElementById(`canvas-${i}`);
                if (!frame || !canvas) continue;

                const viewport = document.querySelector('.carousel-overflow');
                const vw = viewport.clientWidth - 48;
                const vh = window.innerHeight * 0.65;
                const scaleX = vw / CANVAS_W;
                const scaleY = vh / CANVAS_H;
                const scale = Math.min(scaleX, scaleY, 0.55);

                canvas.style.transform = `scale(${scale})`;
                frame.style.width = `${CANVAS_W * scale}px`;
                frame.style.height = `${CANVAS_H * scale}px`;
            }
        }

        function navigate(dir) {
            goTo(Math.max(0, Math.min(TOTAL_SLIDES - 1, currentSlide + dir)));
        }

        function goTo(index) {
            currentSlide = index;
            updateUI();
        }

        function updateUI() {
            document.getElementById('track').style.transform = `translateX(-${currentSlide * 100}%)`;
            document.getElementById('btn-prev').disabled = currentSlide === 0;
            document.getElementById('btn-next').disabled = currentSlide === TOTAL_SLIDES - 1;

            document.querySelectorAll('.dot').forEach((dot, i) => {
                dot.className = 'dot' + (i === currentSlide ? ' active' : '');
            });
        }

        async function downloadSlide(slideNum) {
            const url = `/api/screenshot?post=${encodeURIComponent(POST_ID)}&slide=${slideNum}&w=${CANVAS_W}&h=${CANVAS_H}`;
            const response = await fetch(url);
            if (!response.ok) {
                const err = await response.json().catch(() => ({ error: 'Erro desconhecido' }));
                throw new Error(err.error || `HTTP ${response.status}`);
            }
            const blob = await response.blob();
            const blobUrl = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.download = `${POST_ID}-slide-${String(slideNum).padStart(2, '0')}.png`;
            link.href = blobUrl;
            link.click();
            URL.revokeObjectURL(blobUrl);
        }

        async function exportCurrentSlide() {
            const btn = document.getElementById('btn-download-current');
            const status = document.getElementById('export-status');
            btn.classList.add('loading');
            btn.disabled = true;
            status.textContent = 'Renderizando imagem em alta resolução...';
            status.style.color = '#71717a';

            try {
                await downloadSlide(currentSlide + 1);
                status.textContent = '✅ Download iniciado!';
                status.style.color = '#22c55e';
            } catch (err) {
                console.error('Export error:', err);
                status.textContent = '❌ Erro ao gerar imagem. Veja o console.';
                status.style.color = '#ef4444';
            } finally {
                btn.classList.remove('loading');
                btn.disabled = false;
                setTimeout(() => { status.textContent = ''; }, 4000);
            }
        }

        async function exportAllSlides() {
            const btn = document.getElementById('btn-download-all');
            const status = document.getElementById('export-status');
            btn.classList.add('loading');
            btn.disabled = true;

            try {
                for (let i = 1; i <= TOTAL_SLIDES; i++) {
                    status.textContent = `Renderizando slide ${i} de ${TOTAL_SLIDES}...`;
                    status.style.color = '#71717a';
                    await downloadSlide(i);
                    await new Promise(r => setTimeout(r, 300));
                }
                status.textContent = `✅ Todos os ${TOTAL_SLIDES} slides baixados!`;
                status.style.color = '#22c55e';
            } catch (err) {
                console.error('Export all error:', err);
                status.textContent = '❌ Erro ao gerar imagens. Veja o console.';
                status.style.color = '#ef4444';
            } finally {
                btn.classList.remove('loading');
                btn.disabled = false;
                setTimeout(() => { status.textContent = ''; }, 4000);
            }
        }

        // ─── LIVE EDITOR LOGIC ──────────────────────
        let isEditorActive = false;
        let selectedElement = null;
        let hoverElement = null;

        // Drag & Drop State
        let isDragging = false;
        let dragStartX = 0;
        let dragStartY = 0;
        let initialElementX = 0;
        let initialElementY = 0;

        // Resize State
        let isResizing = false;
        let resizeDir = '';
        let initialResizeRect = null;
        const resizeOverlay = document.getElementById('global-resize-overlay');

        // Undo / Redo State
        let historyStack = [];
        let redoStack = [];
        const MAX_HISTORY = 30;

        const btnToggleEditor = document.getElementById('btn-toggle-editor');
        const editorSidebar = document.getElementById('editor-sidebar');
        const closeEditorBtn = document.getElementById('close-editor');
        const editorHint = document.getElementById('editor-hint');
        const propPanels = document.getElementById('prop-panels');
        const propText = document.getElementById('prop-text');
        const propColor = document.getElementById('prop-color');
        const propColorPicker = document.getElementById('prop-color-picker');
        const propSize = document.getElementById('prop-size');
        const propSizeDisplay = document.getElementById('prop-size-display');
        const btnToggleMove = document.getElementById('btn-toggle-move');
        const moveModeLabel = document.getElementById('move-mode-label');
        const btnUndo = document.getElementById('btn-undo');
        const btnRedo = document.getElementById('btn-redo');
        const btnSaveSlide = document.getElementById('btn-save-slide');
        let isMoveModeActive = false;
        const saveStatus = document.getElementById('save-status');

        function initEditor() {
            btnToggleEditor.addEventListener('click', toggleEditor);
            closeEditorBtn.addEventListener('click', () => { if (isEditorActive) toggleEditor(); });

            // Keyboard Shortcuts for Undo/Redo & Slider Block
            window.addEventListener('keydown', (e) => {
                if (!isEditorActive) return;
                
                // Block slider keys if inside sidebar
                if(e.target.closest('#editor-sidebar') && (e.key === 'ArrowLeft' || e.key === 'ArrowRight')) {
                    e.stopPropagation();
                }

                // Ctrl+Z
                if (e.ctrlKey && e.key === 'z') {
                    e.preventDefault();
                    if (e.shiftKey) handleRedo(); // Ctrl+Shift+Z
                    else handleUndo();
                }
                
                // Ctrl+Y
                if (e.ctrlKey && e.key === 'y') {
                    e.preventDefault();
                    handleRedo();
                }

                // Pressionar ENTER para Soltar o Elemento (Drop) ou Concluir a Edição (Deselect)
                if (e.key === 'Enter') {
                    if (isDragging && isMoveModeActive) {
                        e.preventDefault();
                        handleGlobalMouseUp(e);
                    } else if (selectedElement && document.activeElement !== propText) {
                        // Enter conclui a edição e solta o elemento se não estivermos na text-area de múltiplas linhas
                        e.preventDefault();
                        deselectElement();
                    }
                }
            });

            // Trigger History on Inputs
            let inputTimeout;
            const captureInputHistory = () => {
                clearTimeout(inputTimeout);
                inputTimeout = setTimeout(() => captureState(), 600); // debounce
            };

            // Global Mouse events for dragging
            window.addEventListener('mousemove', handleGlobalMouseMove, { passive: false });
            window.addEventListener('mouseup', handleGlobalMouseUp);

            propText.addEventListener('input', (e) => {
                if (selectedElement) {
                    selectedElement.innerText = e.target.value;
                    captureInputHistory();
                }
            });
            propColor.addEventListener('input', (e) => {
                if (selectedElement) {
                    selectedElement.style.color = e.target.value;
                    selectedElement.style.webkitTextFillColor = e.target.value;
                    propColorPicker.value = isValidHex(e.target.value) ? e.target.value : '#000000';
                }
            });
            propColorPicker.addEventListener('input', (e) => {
                if (selectedElement) {
                    const val = e.target.value;
                    selectedElement.style.color = val;
                    selectedElement.style.webkitTextFillColor = val;
                    propColor.value = val;
                }
            });
            propSize.addEventListener('input', (e) => {
                if (selectedElement) {
                    const val = `${e.target.value}px`;
                    selectedElement.style.fontSize = val;
                    captureInputHistory();
                }
            });

            btnToggleMove.addEventListener('click', toggleMoveMode);
            btnUndo.addEventListener('click', handleUndo);
            btnRedo.addEventListener('click', handleRedo);
            btnSaveSlide.addEventListener('click', saveModifiedSlide);
            window.addEventListener('resize', updateResizeOverlay);
            
            // Setup Resize Handles events
            resizeOverlay.querySelectorAll('.r-handle').forEach(h => {
                h.addEventListener('mousedown', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    if (!selectedElement) return;
                    isResizing = true;
                    resizeDir = e.target.dataset.dir;

                    const computed = window.getComputedStyle(selectedElement);
                    initialResizeRect = {
                        width: parseFloat(computed.width) || selectedElement.offsetWidth,
                        height: parseFloat(computed.height) || selectedElement.offsetHeight,
                        left: parseFloat(computed.left) || 0,
                        top: parseFloat(computed.top) || 0
                    };
                    
                    dragStartX = e.clientX;
                    dragStartY = e.clientY;
                });
            });
        }

        // --- HISTORY ENGINE (UNDO/REDO) ---
        function getSlideHTML() {
            const slideNum = currentSlide + 1;
            const canvas = document.getElementById(`canvas-${slideNum}`);
            if (!canvas || !canvas.shadowRoot) return null;
            return canvas.shadowRoot.innerHTML;
        }

        function restoreSlideHTML(html) {
            const slideNum = currentSlide + 1;
            const canvas = document.getElementById(`canvas-${slideNum}`);
            if (!canvas || !canvas.shadowRoot) return;
            
            // Clean selection before replacing DOM
            deselectElement();
            
            canvas.shadowRoot.innerHTML = html;
            
            // Re-bind listeners for the NEW dom elements in the shadowRoot
            const shadow = canvas.shadowRoot;
            shadow.addEventListener('mouseover', handleShadowMouseOver);
            shadow.addEventListener('mouseout', handleShadowMouseOut);
            shadow.addEventListener('click', handleShadowClick);
            shadow.addEventListener('mousemove', handleGlobalMouseMove, { passive: false });
            shadow.addEventListener('mouseup', handleGlobalMouseUp);
        }

        function captureState() {
            if (!isEditorActive) return;
            const html = getSlideHTML();
            if(!html) return;
            
            // Don't capture if identical to last state
            if(historyStack.length > 0 && historyStack[historyStack.length - 1] === html) return;

            historyStack.push(html);
            if (historyStack.length > MAX_HISTORY) historyStack.shift();
            
            redoStack = []; // Clear redo on new action
            updateHistoryUI();
        }

        function updateHistoryUI() {
            btnUndo.disabled = historyStack.length <= 1; // Need at least 1 back state + current
            btnRedo.disabled = redoStack.length === 0;
        }

        function handleUndo() {
            if (historyStack.length > 1) {
                const currentHtml = getSlideHTML();
                redoStack.push(currentHtml);
                
                historyStack.pop(); // Remove current
                const previousHtml = historyStack[historyStack.length - 1]; // Get real previous
                restoreSlideHTML(previousHtml);
                updateHistoryUI();
            }
        }

        function handleRedo() {
            if (redoStack.length > 0) {
                const nextHtml = redoStack.pop();
                
                // Push current back to history before moving forward
                const currentHtml = getSlideHTML();
                if(historyStack[historyStack.length - 1] !== currentHtml) {
                     historyStack.push(currentHtml);
                }
                
                historyStack.push(nextHtml);
                restoreSlideHTML(nextHtml);
                updateHistoryUI();
            }
        }

        function isValidHex(hex) {
            return /^#[0-9A-F]{6}$/i.test(hex);
        }

        function toggleMoveMode() {
            isMoveModeActive = !isMoveModeActive;
            if (isMoveModeActive) {
                btnToggleMove.style.background = '#f59e0b';
                btnToggleMove.style.color = '#fff';
                moveModeLabel.textContent = 'Mover Livre: ON';
                // Update cursor if something is already selected
                if(selectedElement) selectedElement.style.cursor = 'grab';
            } else {
                btnToggleMove.style.background = '';
                btnToggleMove.style.color = '#f59e0b';
                moveModeLabel.textContent = 'Mover Livre: OFF';
                if(selectedElement) selectedElement.style.cursor = 'crosshair';
            }
        }

        function toggleEditor() {
            isEditorActive = !isEditorActive;
            if (isEditorActive) {
                editorSidebar.classList.add('open');
                btnToggleEditor.style.background = 'var(--accent-dim)';
                btnToggleEditor.innerHTML = '✨ Edição Ativa';
                btnToggleMove.style.display = 'flex'; // Exibe o botão global
                document.body.classList.add('live-editing-active');
                
                // Initialize history stack for the first time
                historyStack = [];
                redoStack = [];
                captureState(); 

                enableShadowDOMEditModes();
            } else {
                editorSidebar.classList.remove('open');
                btnToggleEditor.style.background = '';
                btnToggleEditor.innerHTML = `
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
                    </svg>
                    Editor Automágico
                `;
                btnToggleMove.style.display = 'none'; // Esconde botão se editor off
                document.body.classList.remove('live-editing-active');
                disableShadowDOMEditModes();
                deselectElement();
                if(isMoveModeActive) toggleMoveMode(); // Reset
            }
        }

        function cleanElementStyles(el) {
            if (!el) return;
            el.style.outline = '';
            el.style.outlineOffset = '';
            el.style.cursor = '';
            if (el.getAttribute('style') === '') {
                el.removeAttribute('style');
            }
        }

        // --- DRAG AND DROP ENGINE ---
        function handleGlobalMouseMove(e) {
            if (!isEditorActive || !selectedElement) return;

            if (isResizing) {
                e.preventDefault();
                const deltaX = e.clientX - dragStartX;
                const deltaY = e.clientY - dragStartY;

                const slideNum = currentSlide + 1;
                const canvasContainer = document.getElementById(`canvas-${slideNum}`).parentElement;
                const rect = canvasContainer.getBoundingClientRect();
                const scale = CANVAS_W / rect.width;

                const dX = deltaX * scale;
                const dY = deltaY * scale;

                let newW = initialResizeRect.width;
                let newH = initialResizeRect.height;
                let newL = initialResizeRect.left;
                let newT = initialResizeRect.top;

                if (resizeDir.includes('e')) newW += dX;
                if (resizeDir.includes('s')) newH += dY;
                if (resizeDir.includes('w')) {
                    newW -= dX;
                    newL += dX;
                }
                if (resizeDir.includes('n')) {
                    newH -= dY;
                    newT += dY;
                }

                // Minimum bounds
                if (newW < 20) {
                    if (resizeDir.includes('w')) newL -= (20 - newW);
                    newW = 20;
                }
                if (newH < 20) {
                    if (resizeDir.includes('n')) newT -= (20 - newH);
                    newH = 20;
                }

                selectedElement.style.width = `${newW}px`;
                selectedElement.style.height = `${newH}px`;
                
                if (resizeDir.includes('w') || resizeDir.includes('n')) {
                     const isStatic = window.getComputedStyle(selectedElement).position === 'static';
                     if(isStatic) selectedElement.style.position = 'relative';
                     selectedElement.style.left = `${newL}px`;
                     selectedElement.style.top = `${newT}px`;
                }

                updateResizeOverlay();
                return;
            }

            if (isDragging) {
                e.preventDefault();
                
                // Calcula o deslocamento real do mouse comparado à coordenada EXATA onde o cara clicou no Mousedown
                const deltaX = e.clientX - dragStartOffsetX;
                const deltaY = e.clientY - dragStartOffsetY;

                // Scale factor: o mouse move X pixels na tela, mas o canvas original tem 1080x1350.
                const slideNum = currentSlide + 1;
                const canvasContainer = document.getElementById(`canvas-${slideNum}`).parentElement;
                const rect = canvasContainer.getBoundingClientRect();
                const scale = CANVAS_W / rect.width;

                // Aplica a escala sobre o quanto do mouse MOVEU DESDE O CLIQUE
                const newX = initialElementX + (deltaX * scale);
                const newY = initialElementY + (deltaY * scale);

                selectedElement.style.left = `${newX}px`;
                selectedElement.style.top = `${newY}px`;
                
                updateResizeOverlay();
            }
        }

        function handleGlobalMouseUp(e) {
            if (isResizing) {
                isResizing = false;
                captureState();
            } else if (isDragging) {
                isDragging = false;
                if(selectedElement && isMoveModeActive) {
                    selectedElement.style.cursor = 'grab';
                    // Capture state after finishing the physical move
                    captureState();
                }
            }
        }

        function handleShadowMouseOver(e) {
            // ... (resto intacto)
            if (!isEditorActive) return;
            if (isDragging) return; // Não pisca outlines enquanto arrasta

            const target = e.target;
            if (target.tagName.toLowerCase() === 'svg' || target.closest('svg')) return;
            
            if (hoverElement && hoverElement !== target && hoverElement !== selectedElement) {
                cleanElementStyles(hoverElement);
            }
            if (target !== selectedElement) {
                target.style.outline = '2px dashed var(--accent)';
                target.style.outlineOffset = '4px';
                target.style.cursor = isMoveModeActive ? 'grab' : 'crosshair'; // Cursor muda baseado na intenção global
                hoverElement = target;
            }
        }

        function handleShadowMouseOut(e) {
            if (!isEditorActive || isDragging) return;
            const target = e.target;
            if (target === hoverElement && target !== selectedElement) {
                cleanElementStyles(target);
                hoverElement = null;
            }
        }

        function rgbToHex(color) {
            if (!color || color === 'transparent') return '';
            if (color.startsWith('#')) return color;
            const match = color.match(/^rgba?\((\d+),\s*(\d+),\s*(\d+)/);
            if (!match) return ''; // Fallback
            return "#" + (1 << 24 | parseInt(match[1]) << 16 | parseInt(match[2]) << 8 | parseInt(match[3])).toString(16).slice(1).toUpperCase();
        }

        function handleShadowClick(e) {
            if (!isEditorActive) return;
            e.preventDefault();
            e.stopPropagation();

            const target = e.target;
            if (target.tagName.toLowerCase() === 'svg' || target.closest('svg')) return;

            // Ao clicar, selecionamos (foco para editar texto/cor)
            selectElement(target);

            // --- Ativação do Motor Físico (Drag Start) APENAS se o toggle Global estiver ligado ---
            if (isMoveModeActive) {                
                isDragging = true;
                dragStartX = e.clientX;
                dragStartY = e.clientY;
                selectedElement.style.cursor = 'grabbing';

                // Se o elemento ainda não é Position Absolute, convertemos para Relative
                // Isso preserva a "física" do layout e impede que itens em volta desabem
                const computedStyle = window.getComputedStyle(selectedElement);
                if (computedStyle.position !== 'absolute') {
                    selectedElement.style.position = 'relative';
                }
                
                // Puxa a posição JS calculada para ter algo como base
                initialElementX = parseFloat(computedStyle.left) || 0;
                initialElementY = parseFloat(computedStyle.top) || 0;

                // Salva a Bounding Box real no momento do clique (sem dependência do DOM de margem/flex)
                const rect = selectedElement.getBoundingClientRect();
                
                // Salva a diferença exata entre o clique na TELA e a posição do ELEMENTO na TELA
                // Quando o mouse mover, mudaremos o left relativo a essa diferença
                dragStartOffsetX = e.clientX;
                dragStartOffsetY = e.clientY;
            } else {
                // Modo Edição normal (Cursor Crosshair mantido)
                selectedElement.style.cursor = 'crosshair';
            }
        }

        function updateResizeOverlay() {
            if (!selectedElement || !isEditorActive) {
                resizeOverlay.style.display = 'none';
                return;
            }
            const rect = selectedElement.getBoundingClientRect();
            resizeOverlay.style.display = 'block';
            resizeOverlay.style.top = `${rect.top}px`;
            resizeOverlay.style.left = `${rect.left}px`;
            resizeOverlay.style.width = `${rect.width}px`;
            resizeOverlay.style.height = `${rect.height}px`;
        }

        function selectElement(el) {
            if (selectedElement) {
                cleanElementStyles(selectedElement);
            }
            if (hoverElement) {
                cleanElementStyles(hoverElement);
            }
            
            selectedElement = el;
            // Remover fixed CSS outline a favor do target overlay
            // selectedElement.style.outline = '3px solid var(--accent)';
            // selectedElement.style.outlineOffset = '4px';
            updateResizeOverlay();

            editorHint.style.display = 'none';
            propPanels.style.display = 'block';

            // Use innerText as requested to keep the editing experience clean (no HTML tags),
            // even if it means stripping spans/gradients upon edit.
            propText.value = selectedElement.innerText;
            
            const computedStyle = window.getComputedStyle(selectedElement);
            let color = computedStyle.color;
            let hex = rgbToHex(color);
            propColor.value = hex ? hex : color; // Mostra rgba se não puder converter
            propColorPicker.value = isValidHex(hex) ? hex : '#000000';

            // Font Size sync
            const fSizeStr = computedStyle.fontSize || '16px';
            const fSizeNum = parseInt(fSizeStr, 10);
            propSize.value = isNaN(fSizeNum) ? 16 : fSizeNum;
            propSizeDisplay.textContent = `${isNaN(fSizeNum) ? 16 : fSizeNum}px`;
        }

        function deselectElement() {
            if (selectedElement) {
                cleanElementStyles(selectedElement);
                selectedElement = null;
            }
            if (hoverElement) {
                cleanElementStyles(hoverElement);
                hoverElement = null;
            }
            resizeOverlay.style.display = 'none';
            editorHint.style.display = 'block';
            propPanels.style.display = 'none';
        }

        function enableShadowDOMEditModes() {
            for (let i = 1; i <= TOTAL_SLIDES; i++) {
                const canvas = document.getElementById(`canvas-${i}`);
                if (canvas && canvas.shadowRoot) {
                    const shadow = canvas.shadowRoot;
                    // Listeners na raiz do Shadow DOM
                    shadow.addEventListener('mouseover', handleShadowMouseOver);
                    shadow.addEventListener('mouseout', handleShadowMouseOut);
                    shadow.addEventListener('click', handleShadowClick);
                    
                    // Critical pass-through for dragging inside the shadow boundary
                    shadow.addEventListener('mousemove', handleGlobalMouseMove, { passive: false });
                    shadow.addEventListener('mouseup', handleGlobalMouseUp);
                }
            }
        }

        function disableShadowDOMEditModes() {
            for (let i = 1; i <= TOTAL_SLIDES; i++) {
                const canvas = document.getElementById(`canvas-${i}`);
                if (canvas && canvas.shadowRoot) {
                    const shadow = canvas.shadowRoot;
                    shadow.removeEventListener('mouseover', handleShadowMouseOver);
                    shadow.removeEventListener('mouseout', handleShadowMouseOut);
                    shadow.removeEventListener('click', handleShadowClick);
                    
                    shadow.removeEventListener('mousemove', handleGlobalMouseMove);
                    shadow.removeEventListener('mouseup', handleGlobalMouseUp);
                }
            }
        }

        async function saveModifiedSlide() {
            const slideNum = currentSlide + 1;
            const canvas = document.getElementById(`canvas-${slideNum}`);
            if (!canvas || !canvas.shadowRoot) return;

            // Limpa as seleções atuais
            if (selectedElement) cleanElementStyles(selectedElement);
            if (hoverElement) cleanElementStyles(hoverElement);

            // Double check compulsório: remover QUALQUER sujeira residual de todos os nós
            const allElements = canvas.shadowRoot.querySelectorAll('*');
            allElements.forEach(cleanElementStyles);

            const htmlContent = canvas.shadowRoot.innerHTML;
            
            // Reaplicar ao voltar o foco
            if (selectedElement && isEditorActive) {
                selectedElement.style.outline = '3px solid var(--accent)';
                selectedElement.style.outlineOffset = '4px';
            }

            btnSaveSlide.textContent = 'Salvando...';
            btnSaveSlide.style.opacity = '0.5';

            try {
                const res = await fetch('/api/save-html', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        id: POST_ID,
                        slide: slideNum,
                        html: htmlContent
                    })
                });

                if (res.ok) {
                    saveStatus.style.display = 'block';
                    setTimeout(() => saveStatus.style.display = 'none', 3000);
                } else {
                    const err = await res.json();
                    alert('Erro ao salvar no HD: ' + err.error);
                }
            } catch (err) {
                alert('Erro de Conexão: ' + err.message);
            } finally {
                btnSaveSlide.textContent = 'Salvar no HD';
                btnSaveSlide.style.opacity = '1';
            }
        }
    </script>
</body>

</html>

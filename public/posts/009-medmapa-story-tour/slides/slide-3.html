<style>

    .orb-cyan {

        height: 800px;

        width: 700px;
        height: 700px;
        background: #fbcfe8;

        z-index: 0;
    }

    .orb-mint {

        height: 900px;

        gap: 40px;

        margin: 0;
    }

    .dashboard-mockup {

        z-index: 10;
        box-sizing: border-box;

        justify-content: space-between;

<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    .story {
        width: 1080px;
        height: 1920px;
        position: relative;
        overflow: hidden;
        background: #f8fafc;
        font-family: 'Inter', sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: space-between;
        padding: 80px 60px;
        box-sizing: border-box;
    }

    .orb-cyan {
        position: absolute;
        width: 800px;
        height: 800px;
        background: #cffafe;
        border-radius: 50%;
        top: 20%;
        left: -200px;
        filter: blur(130px);
        z-index: 0;
    }

    .orb-magenta {
        position: absolute;
        width: 700px;
        height: 700px;
        background: #fbcfe8;
        border-radius: 50%;
        top: 40%;
        right: -150px;
        filter: blur(130px);
        z-index: 0;
    }

    .orb-mint {
        position: absolute;
        width: 900px;
        height: 900px;
        background: #d1fae5;
        border-radius: 50%;
        bottom: -200px;
        left: 100px;
        filter: blur(130px);
        z-index: 0;
    }

    .header {
        display: flex;
        align-items: center;
        gap: 12px;
        z-index: 10;
        width: 100%;
        justify-content: center;
    }

    .header svg {
        color: #000000;
        width: 32px;
        height: 32px;
    }

    .header-text {
        font-size: 28px;
        font-weight: 800;
        color: #000000;
        letter-spacing: -0.5px;
    }

    .content-area {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 10;
        width: 100%;
    }

    /* === GLASSMORPHISM NEON BORDER === */
    .glass-card {
        background: rgba(255, 255, 255, 0.45);
        backdrop-filter: blur(32px);
        -webkit-backdrop-filter: blur(32px);
        border: 2px solid rgba(16, 185, 129, 0.4);
        box-shadow: 0 40px 80px rgba(0,0,0,0.06), inset 0 0 40px rgba(16, 185, 129, 0.1);
        padding: 80px 60px;
        border-radius: 48px;
        width: 100%;
        max-width: 900px;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        gap: 32px;
    }

    .card-tag {
        font-size: 20px;
        font-weight: 800;
        color: #10b981;
        text-transform: uppercase;
        letter-spacing: 4px;
        background: rgba(16, 185, 129, 0.1);
        padding: 12px 24px;
        border-radius: 100px;
    }

    .headline {
        font-size: 80px;
        font-weight: 900;
        color: #000000;
        line-height: 1.05;
        letter-spacing: -3px;
        margin: 0;
    }

    .icon-box {
        width: 88px;
        height: 88px;
        background: #ffffff;
        border-radius: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 12px 24px rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.05);
        margin: 16px 0;
    }

    .icon-box svg {
        color: #000000;
        width: 44px;
        height: 44px;
    }

    .bullet-points {
        font-size: 28px;
        font-weight: 700;
        color: #334155;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-wrap: wrap;
        gap: 16px;
    }

    /* === NEON PULSING BUTTON === */
    @keyframes pulse-neon {
        0% { box-shadow: 0 16px 40px rgba(16, 185, 129, 0.4), 0 0 0 0 rgba(16, 185, 129, 0.4); }
        70% { box-shadow: 0 16px 40px rgba(16, 185, 129, 0.4), 0 0 0 20px rgba(16, 185, 129, 0); }
        100% { box-shadow: 0 16px 40px rgba(16, 185, 129, 0.4), 0 0 0 0 rgba(16, 185, 129, 0); }
    }

    .cta-button {
        background: #10B981;
        color: #ffffff;
        font-size: 36px;
        font-weight: 900;
        padding: 36px 64px;
        border-radius: 100px;
        width: 100%;
        margin-top: 32px;
        box-sizing: border-box;
        border: none;
        animation: pulse-neon 2s infinite;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    /* === LINK STICKER (FAKE) === */
    .link-area {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        z-index: 10;
        margin-bottom: 20px;
    }

    .tap-hint {
        font-size: 20px;
        font-weight: 600;
        color: #64748b;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .link-pill {
        background: #ffffff;
        padding: 24px 56px;
        border-radius: 100px;
        box-shadow: 0 16px 48px rgba(0,0,0,0.08);
        display: flex;
        align-items: center;
        gap: 16px;
        font-size: 30px;
        font-weight: 800;
        color: #000000;
        border: 1px solid rgba(0,0,0,0.05);
    }
</style>

<div class="story">
    <div class="orb-cyan"></div>
    <div class="orb-magenta"></div>
    <div class="orb-mint"></div>

    <div class="header">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 3 2 6v15l7-3 6 3 7-3V3l-7 3-6-3z" />
            <path d="M9 3v15" /><path d="M15 6v15" />
        </svg>
        <span class="header-text">MedMapa</span>
    </div>

    <div class="content-area">
        <div class="glass-card">
            <div class="card-tag">DISPONÍVEL AGORA</div>
            <h2 class="headline">Assine por<br>R$ 19,90/mês.</h2>
            
            <div class="icon-box">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
                </svg>
            </div>

            <div class="bullet-points">
                <span>Plano Mensal</span>
                <span style="color: #cbd5e1;">•</span>
                <span>Plataforma Completa</span>
                <span style="color: #cbd5e1;">•</span>
                <span>Garantia de 7 Dias</span>
            </div>
            
            <button class="cta-button">Começar Mapeamento</button>
        </div>
    </div>

    <!-- Fake Link Sticker -->
    <div class="link-area">
        <div class="tap-hint">↑ Toque para acessar a plataforma</div>
        <div class="link-pill">🔗 medmapa.com.br</div>
    </div>
</div>

<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    .story {
        width: 1080px;
        height: 1920px;
        position: relative;
        overflow: hidden;
        background: #f8fafc;
        font-family: 'Inter', sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 80px 60px;
        box-sizing: border-box;
    }

    /* === ORBES DIN MICAS === */
    .orb-cyan {
        position: absolute;
        width: 800px;
        height: 800px;
        background: #cffafe;
        border-radius: 50%;
        top: 20%;
        left: -200px;
        filter: blur(130px);
        z-index: 0;
    }

    .orb-magenta {
        position: absolute;
        width: 700px;
        height: 700px;
        background: #fbcfe8;
        border-radius: 50%;
        top: 40%;
        right: -150px;
        filter: blur(130px);
        z-index: 0;
    }

    .orb-mint {
        position: absolute;
        width: 900px;
        height: 900px;
        background: #d1fae5;
        border-radius: 50%;
        bottom: -200px;
        left: 100px;
        filter: blur(130px);
        z-index: 0;
    }

    /* === HEADER PADRÃO === */
    .header {
        display: flex;
        align-items: center;
        gap: 12px;
        z-index: 10;
        width: 100%;
        justify-content: center;
    }

    .header svg {
        color: #000000;
        width: 32px;
        height: 32px;
    }

    .header-text {
        font-size: 28px;
        font-weight: 800;
        color: #000000;
        letter-spacing: -0.5px;
    }

    /* === CONTEÚDO CAPA === */
    .content-area {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        z-index: 10;
        width: 100%;
        padding: 0 40px;
    }

    .tour-tag {
        background: rgba(16, 185, 129, 0.2);
        color: #047857;
        padding: 14px 28px;
        border-radius: 100px;
        font-size: 20px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 4px;
        margin-bottom: 50px;
        backdrop-filter: blur(10px);
        border: 1px solid rgba(16, 185, 129, 0.3);
    }

    .headline {
        font-size: 140px;
        font-weight: 900;
        color: #000000;
        line-height: 0.95;
        letter-spacing: -5px;
        margin-bottom: 50px;
        text-transform: uppercase;
    }

    .grad-metal {
        background: linear-gradient(135deg, #94a3b8 0%, #334155 50%, #0f172a 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
    }

    .subtitle {
        font-size: 36px;
        font-weight: 500;
        color: #334155;
        line-height: 1.5;
        max-width: 850px;
    }

    /* === INDICADOR VISUAL === */
    .indicator {
        position: absolute;
        bottom: 80px;
        right: 80px;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 80px;
        height: 80px;
        background: #000000;
        border-radius: 50%;
        box-shadow: 0 16px 32px rgba(0,0,0,0.2);
        z-index: 10;
    }

    .indicator svg {
        color: #ffffff;
        width: 32px;
        height: 32px;
    }
</style>

<div class="story" style="outline-offset: 4px;">
    <div class="orb-cyan"></div>
    <div class="orb-magenta"></div>
    <div class="orb-mint"></div>

    <div class="header">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 3 2 6v15l7-3 6 3 7-3V3l-7 3-6-3z"></path>
            <path d="M9 3v15"></path><path d="M15 6v15"></path>
        </svg>
        <span class="header-text">MedMapa</span>
    </div>

    <div class="content-area" style="outline-offset: 4px;">
        <div class="tour-tag">TOUR OFICIAL</div>
        <h1 class="headline" style="outline-offset: 4px; cursor: crosshair; color: rgb(0, 0, 0); -webkit-text-fill-color: rgb(0, 0, 0);">O <span class="grad-metal">FIM</span> DO<br>ESTUDO CEGO.</h1>
        <p class="subtitle" style="outline-offset: 4px;">Arraste para conhecer o ecossistema que vai mapear a sua aprovação no R1.</p>
    </div>

    <div class="indicator">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12h14"></path><path d="m12 5 7 7-7 7"></path>
        </svg>
    </div>
</div>

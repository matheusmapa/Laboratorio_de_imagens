<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    .story {
        width: 1080px;
        height: 1920px;
        position: relative;
        overflow: hidden;
        background: #f8fafc;
        font-family: 'Inter', sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 80px 60px;
        box-sizing: border-box;
    }

    .orb-cyan {
        position: absolute;
        width: 800px;
        height: 800px;
        background: #cffafe;
        border-radius: 50%;
        top: 20%;
        left: -200px;
        filter: blur(130px);
        z-index: 0;
    }

    .orb-magenta {
        position: absolute;
        width: 700px;
        height: 700px;
        background: #fbcfe8;
        border-radius: 50%;
        top: 40%;
        right: -150px;
        filter: blur(130px);
        z-index: 0;
    }

    .orb-mint {
        position: absolute;
        width: 900px;
        height: 900px;
        background: #d1fae5;
        border-radius: 50%;
        bottom: -200px;
        left: 100px;
        filter: blur(130px);
        z-index: 0;
    }

    .header {
        display: flex;
        align-items: center;
        gap: 12px;
        z-index: 10;
        width: 100%;
        justify-content: center;
    }

    .header svg {
        color: #000000;
        width: 32px;
        height: 32px;
    }

    .header-text {
        font-size: 28px;
        font-weight: 800;
        color: #000000;
        letter-spacing: -0.5px;
    }

    .content-area {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 10;
        width: 100%;
    }

    /* === GLASSMORPHISM REAL === */
    .glass-card {
        background: rgba(255, 255, 255, 0.45);
        backdrop-filter: blur(32px);
        -webkit-backdrop-filter: blur(32px);
        border: 1px solid rgba(255, 255, 255, 0.8);
        box-shadow: 0 40px 80px rgba(0,0,0,0.06);
        padding: 80px 60px;
        border-radius: 48px;
        width: 100%;
        max-width: 900px;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 40px;
    }

    .icon-box {
        width: 88px;
        height: 88px;
        background: #ffffff;
        border-radius: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 12px 24px rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.05);
    }

    .icon-box svg {
        color: #000000;
        width: 44px;
        height: 44px;
    }

    .headline {
        font-size: 80px;
        font-weight: 900;
        color: #000000;
        line-height: 1.05;
        letter-spacing: -3px;
        margin: 0;
        text-transform: uppercase;
    }

    .card-text {
        font-size: 34px;
        font-weight: 500;
        color: #334155;
        line-height: 1.5;
        margin: 0;
    }

    /* === TAGS FILTROS === */
    .tags-container {
        display: flex;
        flex-wrap: wrap;
        gap: 16px;
        margin-top: 40px;
        width: 100%;
        max-width: 900px;
        justify-content: center;
        z-index: 10;
    }

    .filter-tag {
        background: rgba(255, 255, 255, 0.6);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid #000000;
        color: #000000;
        font-size: 20px;
        font-weight: 800;
        padding: 16px 32px;
        border-radius: 100px;
        text-transform: uppercase;
        letter-spacing: 2px;
        box-shadow: 0 12px 24px rgba(0,0,0,0.04);
    }
</style>

<div class="story">
    <div class="orb-cyan"></div>
    <div class="orb-magenta"></div>
    <div class="orb-mint"></div>

    <div class="header">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 3 2 6v15l7-3 6 3 7-3V3l-7 3-6-3z" />
            <path d="M9 3v15" /><path d="M15 6v15" />
        </svg>
        <span class="header-text">MedMapa</span>
    </div>

    <div class="content-area">
        <div class="glass-card">
            <div class="icon-box">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10" />
                    <circle cx="12" cy="12" r="6" />
                    <circle cx="12" cy="12" r="2" />
                </svg>
            </div>
            
            <h2 class="headline">BANCO<br>CIRÚRGICO.</h2>
            <p class="card-text">Filtramos apenas o padrão de cobrança das Grandes Bancas.</p>
        </div>
        
        <div class="tags-container">
            <div class="filter-tag">Clínica Médica</div>
            <div class="filter-tag">Cirurgia</div>
            <div class="filter-tag">SUS</div>
        </div>
    </div>
</div>

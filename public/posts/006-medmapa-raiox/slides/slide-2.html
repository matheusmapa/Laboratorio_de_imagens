<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    .slide-wrapper {
        width: 1080px;
        height: 1350px;
        background: linear-gradient(135deg, #080b14 0%, #111827 100%);
        font-family: 'Inter', sans-serif;
        position: relative;
        padding: 120px 100px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        box-sizing: border-box;
        color: white;
        overflow: hidden;
    }

    .slide-wrapper::before {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 140%;
        height: 140%;
        background: radial-gradient(circle at 30% 70%, rgba(37, 99, 235, 0.08) 0%, transparent 60%);
        pointer-events: none;
        z-index: 0;
    }

    .h2-title {
        font-size: 76px;
        font-weight: 900;
        line-height: 1.1;
        letter-spacing: -3px;
        text-align: center;
        margin-bottom: 70px;
        z-index: 2;
        text-shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
    }

    .glass-card {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 45px;
        padding: 70px 60px;
        width: 100%;
        max-width: 880px;
        backdrop-filter: blur(25px);
        box-shadow: 0 40px 90px -20px rgba(0, 0, 0, 0.8), inset 0 2px 20px rgba(255, 255, 255, 0.03);
        z-index: 1;
        position: relative;
    }

    .glass-card::before {
        content: '80/20';
        position: absolute;
        top: -40px;
        right: 40px;
        font-size: 110px;
        font-weight: 950;
        color: rgba(37, 99, 235, 0.08);
        z-index: -1;
    }

    .body-text {
        font-size: 38px;
        color: #cbd5e1;
        font-weight: 400;
        line-height: 1.6;
        margin: 0;
        text-align: center;
    }

    .body-text b {
        color: #fff;
        font-weight: 800;
    }

    .highlight-blue {
        color: #60a5fa;
        text-shadow: 0 0 20px rgba(59, 130, 246, 0.4);
    }
</style>

<div class="slide-wrapper">
    <h2 class="h2-title">Você não precisa saber tudo. Precisa dos <span class="highlight-blue">20%</span> da nota.</h2>

    <div class="glass-card">
        <p class="body-text">
            A maioria tenta decorar técnica cirúrgica rara, enquanto erra o básico de trauma.
            <br><br>
            <b>Veja o verdadeiro mapa da prova:</b>
        </p>
    </div>
</div>

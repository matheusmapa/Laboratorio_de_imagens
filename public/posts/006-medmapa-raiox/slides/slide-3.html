<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    .slide-wrapper {
        width: 1080px;
        height: 1350px;
        background: linear-gradient(135deg, #080b14 0%, #111827 100%);
        font-family: 'Inter', sans-serif;
        position: relative;
        padding: 120px 80px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        box-sizing: border-box;
        color: white;
        overflow: hidden;
    }

    .slide-wrapper::before {
        content: '';
        position: absolute;
        bottom: -10%;
        left: -10%;
        width: 140%;
        height: 140%;
        background: radial-gradient(circle at 30% 80%, rgba(16, 185, 129, 0.08) 0%, transparent 60%);
        pointer-events: none;
        z-index: 0;
    }

    .h2-title {
        font-size: 76px;
        font-weight: 900;
        line-height: 1.1;
        letter-spacing: -3px;
        text-align: center;
        margin-bottom: 70px;
        z-index: 2;
        width: 100%;
    }

    .chart-container {
        width: 100%;
        max-width: 900px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 40px;
        padding: 60px;
        backdrop-filter: blur(20px);
        box-shadow: 0 40px 80px rgba(0, 0, 0, 0.6);
        display: flex;
        flex-direction: column;
        gap: 50px;
        z-index: 1;
    }

    .stat-row {
        display: flex;
        flex-direction: column;
        gap: 15px;
    }

    .stat-label {
        font-size: 26px;
        font-weight: 800;
        color: #fff;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .stat-value {
        font-size: 30px;
        font-weight: 900;
        opacity: 0.9;
    }

    .progress-bg {
        width: 100%;
        height: 36px;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 100px;
        position: relative;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .progress-fill {
        height: 100%;
        border-radius: 100px;
        transition: width 1s ease-out;
        box-shadow: 0 0 30px rgba(0, 0, 0, 0.3);
    }

    .color-red {
        background: linear-gradient(90deg, #ef4444 0%, #f87171 100%);
        box-shadow: 0 0 30px rgba(239, 68, 68, 0.4);
    }

    .color-orange {
        background: linear-gradient(90deg, #f59e0b 0%, #fbbf24 100%);
        box-shadow: 0 0 30px rgba(245, 158, 11, 0.4);
    }

    .color-blue {
        background: linear-gradient(90deg, #3b82f6 0%, #60a5fa 100%);
        box-shadow: 0 0 30px rgba(59, 130, 246, 0.4);
    }

    .footer-text {
        font-size: 32px;
        color: #cbd5e1;
        line-height: 1.5;
        text-align: center;
        margin-top: 60px;
        max-width: 900px;
        z-index: 1;
    }

    .footer-text b {
        color: #fff;
        font-weight: 800;
    }
</style>

<div class="slide-wrapper">
    <h2 class="h2-title">Top 3 Temas de <br>Cirurgia Geral:</h2>

    <div class="chart-container">
        <!-- Trauma -->
        <div class="stat-row">
            <div class="stat-label">
                <span>Trauma e ATLS</span>
                <span class="stat-value" style="color: #f87171;">35%</span>
            </div>
            <div class="progress-bg">
                <div class="progress-fill color-red" style="width: 35%;"></div>
            </div>
        </div>

        <!-- Abdome Agudo -->
        <div class="stat-row">
            <div class="stat-label">
                <span>Abdome Agudo</span>
                <span class="stat-value" style="color: #fbbf24;">28%</span>
            </div>
            <div class="progress-bg">
                <div class="progress-fill color-orange" style="width: 28%;"></div>
            </div>
        </div>

        <!-- Hérnias -->
        <div class="stat-row">
            <div class="stat-label">
                <span>Hérnias Abdominais</span>
                <span class="stat-value" style="color: #60a5fa;">15%</span>
            </div>
            <div class="progress-bg">
                <div class="progress-fill color-blue" style="width: 15%;"></div>
            </div>
        </div>
    </div>

    <p class="footer-text">
        Se você tem pouco tempo hoje, foque em ATLS.
        <br>
        <b>É o que mais cai, sem discussão.</b>
    </p>
</div>

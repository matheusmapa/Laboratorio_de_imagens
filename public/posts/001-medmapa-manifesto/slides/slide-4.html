<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    .slide-wrapper {
        width: 1080px;
        height: 1350px;
        background: linear-gradient(145deg, #080b14 0%, #111827 100%);
        font-family: 'Inter', sans-serif;
        position: relative;
        padding: 120px 100px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        box-sizing: border-box;
        color: white;
        overflow: hidden;
    }

    .slide-wrapper::before {
        content: '';
        position: absolute;
        top: 0;
        left: -30%;
        width: 140%;
        height: 140%;
        background: radial-gradient(circle at 100% 100%, rgba(37, 99, 235, 0.15) 0%, transparent 60%);
        pointer-events: none;
        z-index: 0;
    }

    .content-area {
        z-index: 1;
        display: flex;
        flex-direction: column;
        gap: 60px;
    }

    .h2-title {
        font-size: 72px;
        font-weight: 900;
        line-height: 1.15;
        letter-spacing: -2px;
        margin: 0;
        text-align: center;
        text-shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
    }

    .highlight-blue {
        color: #60a5fa;
        background: linear-gradient(90deg, #93c5fd 0%, #3b82f6 100%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .grid-container {
        display: flex;
        flex-direction: column;
        gap: 35px;
    }

    .grid-card {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 32px;
        padding: 45px 50px;
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 2px 20px rgba(255, 255, 255, 0.02);
        position: relative;
        overflow: hidden;
        display: flex;
        align-items: center;
        gap: 35px;
    }

    .grid-card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 6px;
        height: 100%;
        background: linear-gradient(180deg, #60a5fa 0%, #3b82f6 100%);
        box-shadow: 0 0 20px rgba(59, 130, 246, 0.8);
    }

    .card-icon {
        width: 64px;
        height: 64px;
        border-radius: 16px;
        background: rgba(37, 99, 235, 0.1);
        border: 1px solid rgba(37, 99, 235, 0.2);
        display: flex;
        justify-content: center;
        align-items: center;
        flex-shrink: 0;
        box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2);
    }

    .card-icon svg {
        color: #60a5fa;
        width: 32px;
        height: 32px;
        stroke-width: 2.5;
        filter: drop-shadow(0 0 8px rgba(96, 165, 250, 0.6));
    }

    .card-content {
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    .card-title {
        font-size: 34px;
        font-weight: 800;
        color: #fff;
        margin: 0;
        text-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
    }

    .card-text {
        font-size: 28px;
        font-weight: 500;
        color: #cbd5e1;
        line-height: 1.5;
        margin: 0;
    }
</style>

<div class="slide-wrapper">
    <div class="content-area">
        <h2 class="h2-title">Tudo o que você precisa na <span class="highlight-blue">reta final.</span></h2>

        <div class="grid-container">
            <div class="grid-card">
                <div class="card-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round"
                        stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10" />
                        <circle cx="12" cy="12" r="6" />
                        <circle cx="12" cy="12" r="2" />
                    </svg>
                </div>
                <div class="card-content">
                    <h3 class="card-title">Banco Cirúrgico</h3>
                    <p class="card-text">Milhares de questões comentadas focadas no padrão das Grandes Bancas.</p>
                </div>
            </div>

            <div class="grid-card">
                <div class="card-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path
                            d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-3.18-4.44A3.5 3.5 0 0 1 2 5.5 2.5 2.5 0 0 1 4.5 3h5z" />
                        <path
                            d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96.44 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 3.18-4.44A3.5 3.5 0 0 0 22 5.5 2.5 2.5 0 0 0 19.5 3h-5z" />
                    </svg>
                </div>
                <div class="card-content">
                    <h3 class="card-title">Caderno de Erros</h3>
                    <p class="card-text">O sistema salva onde você tropeça pra você revisar rápido.</p>
                </div>
            </div>

            <div class="grid-card">
                <div class="card-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M3 3v18h18" />
                        <path d="M18 17V9" />
                        <path d="M13 17V5" />
                        <path d="M8 17v-3" />
                    </svg>
                </div>
                <div class="card-content">
                    <h3 class="card-title">Métricas de Alta Performance</h3>
                    <p class="card-text">O raio-x que te mostra exatamente onde focar.</p>
                </div>
            </div>
        </div>
    </div>
</div>

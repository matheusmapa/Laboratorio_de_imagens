<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    .slide-wrapper {
        width: 1080px;
        height: 1350px;
        background: linear-gradient(145deg, #080b14 0%, #111827 100%);
        font-family: 'Inter', sans-serif;
        position: relative;
        padding: 120px 100px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        box-sizing: border-box;
        color: white;
        overflow: hidden;
    }

    .slide-wrapper::before {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 140%;
        height: 140%;
        background: radial-gradient(circle at center, rgba(37, 99, 235, 0.2) 0%, transparent 65%);
        pointer-events: none;
        z-index: 0;
    }

    .content-area {
        z-index: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        width: 100%;
        gap: 60px;
    }

    .logo-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 30px;
        margin-bottom: 20px;
    }

    .logo-icon-large {
        position: relative;
        width: 160px;
        height: 160px;
        display: flex;
        justify-content: center;
        align-items: center;
        background: rgba(37, 99, 235, 0.05);
        border: 1px solid rgba(37, 99, 235, 0.2);
        border-radius: 50%;
        box-shadow: 0 0 80px rgba(37, 99, 235, 0.3), inset 0 0 30px rgba(37, 99, 235, 0.1);
        backdrop-filter: blur(10px);
    }

    .logo-icon-large svg {
        color: #60a5fa;
        filter: drop-shadow(0 0 20px rgba(59, 130, 246, 0.8));
    }

    .logo-text {
        font-size: 56px;
        font-weight: 900;
        letter-spacing: -2px;
        color: #fff;
        text-shadow: 0 10px 30px rgba(0, 0, 0, 0.8), 0 0 40px rgba(59, 130, 246, 0.4);
    }

    .h2-title {
        font-size: 64px;
        font-weight: 900;
        line-height: 1.15;
        letter-spacing: -2px;
        margin: 0;
        text-shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
    }

    .highlight-blue {
        color: #60a5fa;
        background: linear-gradient(90deg, #93c5fd 0%, #3b82f6 100%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        display: inline-block;
    }

    .body-card {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 36px;
        padding: 50px 60px;
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.6), inset 0 2px 20px rgba(255, 255, 255, 0.03);
    }

    .body-text {
        font-size: 32px;
        color: #e2e8f0;
        font-weight: 500;
        line-height: 1.6;
        margin: 0;
    }
</style>

<div class="slide-wrapper">
    <div class="content-area">
        <div class="logo-container">
            <div class="logo-icon-large">
                <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 3 2 6v15l7-3 6 3 7-3V3l-7 3-6-3z" />
                    <path d="M9 3v15" />
                    <path d="M15 6v15" />
                </svg>
            </div>
            <div class="logo-text">MedMapa</div>
        </div>

        <h2 class="h2-title"><span
                style="color:#ef4444;text-decoration:line-through;text-decoration-thickness:4px;text-decoration-color:rgba(239,68,68,0.6)">Ler
                PDF</span> não garante vaga.<br>O <span class="highlight-blue">Estudo Ativo</span> garante.</h2>

        <div class="body-card">
            <p class="body-text">O ecossistema completo de alta performance pra quem foca no R1. Desenhado pra realidade
                caótica de quem precisa fazer o tempo render, direto ao ponto.</p>
        </div>
    </div>
</div>

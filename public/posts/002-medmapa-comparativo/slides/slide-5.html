<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    .slide-wrapper {
        width: 1080px;
        height: 1350px;
        background: linear-gradient(135deg, #080b14 0%, #111827 100%);
        font-family: 'Inter', sans-serif;
        position: relative;
        padding: 120px 100px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        box-sizing: border-box;
        color: white;
        overflow: hidden;
    }

    .slide-wrapper::before {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 150%;
        height: 150%;
        background: radial-gradient(circle at 50% 50%, rgba(16, 185, 129, 0.12) 0%, transparent 60%);
        pointer-events: none;
        z-index: 0;
    }

    .content-area {
        z-index: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        width: 100%;
        gap: 60px;
    }

    .h2-title {
        font-size: 72px;
        font-weight: 900;
        line-height: 1.15;
        letter-spacing: -2px;
        margin: 0;
        text-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
    }

    .h2-title span {
        position: relative;
        color: #ef4444;
        text-decoration: none;
        text-shadow: none;
    }

    .h2-title span::after {
        content: '';
        position: absolute;
        left: -10px;
        top: 50%;
        width: calc(100% + 20px);
        height: 8px;
        background: #ef4444;
        transform: rotate(-3deg);
        border-radius: 4px;
        box-shadow: 0 0 15px rgba(239, 68, 68, 0.8), 0 0 5px rgba(239, 68, 68, 1);
        z-index: -1;
    }

    .pricing-card {
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid rgba(16, 185, 129, 0.2);
        border-radius: 40px;
        padding: 70px 60px;
        width: 100%;
        max-width: 850px;
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.05), inset 0 0 60px rgba(16, 185, 129, 0.05);
        display: flex;
        flex-direction: column;
        align-items: center;
        position: relative;
    }

    .plan-name {
        font-size: 24px;
        font-weight: 700;
        color: #34d399;
        text-transform: uppercase;
        letter-spacing: 2px;
        margin-bottom: 20px;
    }

    .price {
        font-size: 110px;
        font-weight: 900;
        color: #fff;
        line-height: 1;
        margin-bottom: 30px;
        letter-spacing: -4px;
        text-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    .price span {
        font-size: 32px;
        font-weight: 600;
        color: #94a3b8;
        letter-spacing: 0;
    }

    .features {
        font-size: 30px;
        font-weight: 500;
        color: #e2e8f0;
        margin-bottom: 60px;
    }

    .cta-button {
        background: #10b981;
        color: #022c22;
        font-size: 26px;
        font-weight: 800;
        padding: 24px 60px;
        border-radius: 100px;
        text-align: center;
        box-shadow: 0 10px 30px rgba(16, 185, 129, 0.3), 0 0 20px rgba(16, 185, 129, 0.4);
        transition: transform 0.2s, box-shadow 0.2s;
    }

    .footer {
        font-size: 30px;
        font-weight: 500;
        color: #94a3b8;
        max-width: 900px;
        line-height: 1.5;
    }
</style>

<div class="slide-wrapper">
    <div class="content-area">
        <h2 class="h2-title">Cancele as mensalidades <span>abusivas</span>.</h2>

        <div class="pricing-card">
            <div class="plan-name">Plano mensal</div>
            <div class="price">R$ 19,90<span>/mês</span></div>
            <div class="features">Acesso total à plataforma</div>

            <div class="cta-button">Garantia de 7 Dias</div>
        </div>

        <div class="footer">Seu futuro no R1 vale muito mais do que mensalidades abusivas. Escolha o seu plano e comece
            hoje.</div>
    </div>
</div>

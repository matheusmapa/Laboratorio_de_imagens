<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    .slide-wrapper {
        width: 1080px;
        height: 1350px;
        background: linear-gradient(135deg, #080b14 0%, #111827 100%);
        font-family: 'Inter', sans-serif;
        position: relative;
        padding: 120px 60px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        box-sizing: border-box;
        color: white;
        overflow: hidden;
    }

    .content-area {
        z-index: 1;
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    .cards-container {
        display: flex;
        gap: 30px;
        width: 100%;
        margin-top: 20px;
        align-items: center;
    }

    .compare-card {
        flex: 1;
        border-radius: 36px;
        padding: 60px 40px;
        display: flex;
        flex-direction: column;
        position: relative;
        overflow: hidden;
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
    }

    .card-red {
        background: rgba(239, 68, 68, 0.03);
        border: 1px solid rgba(239, 68, 68, 0.3);
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6), inset 0 0 80px rgba(239, 68, 68, 0.05);
        height: auto;
    }

    .card-red::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle at 50% 0%, rgba(239, 68, 68, 0.1) 0%, transparent 60%);
        pointer-events: none;
    }

    .card-green {
        background: rgba(16, 185, 129, 0.05);
        border: 1px solid rgba(16, 185, 129, 0.5);
        box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.7), inset 0 0 100px rgba(16, 185, 129, 0.1), 0 0 40px rgba(16, 185, 129, 0.2);
        transform: scale(1.05);
        z-index: 2;
        padding: 70px 40px;
    }

    .card-green::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle at 50% 0%, rgba(16, 185, 129, 0.15) 0%, transparent 70%);
        pointer-events: none;
    }

    .card-title {
        font-size: 38px;
        font-weight: 800;
        margin-bottom: 40px;
        text-align: center;
        z-index: 1;
    }

    .card-red .card-title {
        color: #f87171;
    }

    .card-green .card-title {
        color: #34d399;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 15px;
        text-shadow: 0 0 20px rgba(16, 185, 129, 0.4);
    }

    .price-tag {
        font-size: 64px;
        font-weight: 900;
        text-align: center;
        margin-bottom: 50px;
        line-height: 1;
        z-index: 1;
        letter-spacing: -2px;
    }

    .price-tag span {
        font-size: 24px;
        font-weight: 600;
        color: #94a3b8;
        letter-spacing: 0;
    }

    .list {
        display: flex;
        flex-direction: column;
        gap: 30px;
        z-index: 1;
    }

    .list-item {
        display: flex;
        align-items: flex-start;
        gap: 16px;
        font-size: 24px;
        font-weight: 500;
        color: #e2e8f0;
        line-height: 1.5;
    }

    .icon-red {
        color: #ef4444;
        flex-shrink: 0;
        margin-top: 2px;
        filter: drop-shadow(0 0 5px rgba(239, 68, 68, 0.5));
    }

    .icon-green {
        color: #10b981;
        flex-shrink: 0;
        margin-top: 2px;
        filter: drop-shadow(0 0 5px rgba(16, 185, 129, 0.5));
    }
</style>

                <div class="list">
                    <div class="list-item">

                    </div>

                            <path d="M18 6 6 18" />

                        </svg>
                        Resumos generalistas
                    </div>
                    <div class="list-item">

                            stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M18 6 6 18" />

                    </div>

                        <path d="M9 3 2 6v15l7-3 6 3 7-3V3l-7 3-6-3z" />

                            <polyline points="20 6 9 17 4 12" />
                        </svg>

                    </div>
                    <div class="list-item">

                            <polyline points="20 6 9 17 4 12" />
                        </svg>
                        Caderno de Erros Ativo
                    </div>
                    <div class="list-item">
                        <svg class="icon-green" width="32" height="32" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="20 6 9 17 4 12" />

    </div>

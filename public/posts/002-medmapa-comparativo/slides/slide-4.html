<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    .slide-wrapper {
        width: 1080px;
        height: 1350px;
        background: linear-gradient(135deg, #080b14 0%, #111827 100%);
        font-family: 'Inter', sans-serif;
        position: relative;
        padding: 120px 100px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        box-sizing: border-box;
        color: white;
        overflow: hidden;
    }

    .slide-wrapper::before {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 140%;
        height: 140%;
        background: radial-gradient(circle at center, rgba(16, 185, 129, 0.15) 0%, transparent 60%);
        pointer-events: none;
        z-index: 0;
    }

    .content-area {
        z-index: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
        gap: 60px;
    }

    .icon-container {
        width: 160px;
        height: 160px;
        background: rgba(16, 185, 129, 0.05);
        border: 1px solid rgba(16, 185, 129, 0.3);
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 60px rgba(16, 185, 129, 0.3), inset 0 0 20px rgba(16, 185, 129, 0.1);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        position: relative;
    }

    .icon-container::before {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 100%;
        height: 100%;
        border-radius: 50%;
        background: radial-gradient(circle at center, rgba(16, 185, 129, 0.2) 0%, transparent 70%);
        z-index: 0;
    }

    .icon-container svg {
        color: #10b981;
        width: 72px;
        height: 72px;
        z-index: 1;
        filter: drop-shadow(0 0 15px rgba(16, 185, 129, 0.8));
    }

    .h2-title {
        font-size: 72px;
        font-weight: 900;
        line-height: 1.15;
        letter-spacing: -2px;
        margin: 0;
        text-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
    }

    .highlight-green {
        color: #34d399;
        text-shadow: 0 0 40px rgba(16, 185, 129, 0.3);
    }

    .body-text {
        font-size: 32px;
        color: #cbd5e1;
        font-weight: 400;
        line-height: 1.6;
        max-width: 900px;
        margin: 0;
        text-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
    }

    .body-bold {
        font-weight: 700;
        color: #fff;
    }
</style>

<div class="slide-wrapper">
    <div class="content-area">
        <div class="icon-container">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                stroke-linejoin="round">
                <path d="M12 2v20" />
                <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" />
            </svg>
        </div>

        <h2 class="h2-title">Custa menos que um lanche na <span class="highlight-green">cantina do hospital.</span></h2>

        <p class="body-text" style="font-size: 38px;">No plano anual, você investe <span class="body-bold">centavos por
                dia</span>. O acesso ao ecossistema premium mais acessível e inteligente do país. O mesmo padrão das
            Grandes Bancas, <span class="body-bold">sem o preço absurdo.</span></p>
    </div>
</div>

<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    .slide-wrapper {
        width: 1080px;
        height: 1350px;
        background: linear-gradient(135deg, #080b14 0%, #111827 100%);
        font-family: 'Inter', sans-serif;
        position: relative;
        padding: 120px 100px;
        display: flex;
        flex-direction: column;
        box-sizing: border-box;
        color: white;
        overflow: hidden;
    }

    .slide-wrapper::before {
        content: '';
        position: absolute;
        top: 0;
        right: -30%;
        width: 140%;
        height: 140%;
        background: radial-gradient(circle at 70% 40%, rgba(239, 68, 68, 0.15) 0%, transparent 60%);
        pointer-events: none;
        z-index: 0;
    }

    .top-bar {
        position: absolute;
        top: 80px;
        left: 100px;
        display: flex;
        align-items: center;
        gap: 16px;
        z-index: 2;
        font-size: 32px;
        font-weight: 800;
        letter-spacing: -1px;
        color: #fff;
    }

    .logo-icon {
        position: relative;
        width: 48px;
        height: 48px;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .logo-icon svg {
        color: #60a5fa;
        filter: drop-shadow(0 0 10px rgba(59, 130, 246, 0.6));
    }

    .main-content {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: flex-start;
        z-index: 1;
        margin-top: 40px;
    }

    .tag {
        display: inline-block;
        padding: 12px 28px;
        border-radius: 100px;
        background: rgba(239, 68, 68, 0.05);
        border: 1px solid rgba(239, 68, 68, 0.2);
        color: #fca5a5;
        font-size: 20px;
        font-weight: 700;
        margin-bottom: 50px;
        box-shadow: 0 10px 30px rgba(239, 68, 68, 0.15), inset 0 1px 0 rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
    }

    .h1-title {
        font-size: 80px;
        font-weight: 900;
        line-height: 1.15;
        letter-spacing: -2px;
        margin-bottom: 40px;
        margin-top: 0;
        text-shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
    }

    .highlight-red {
        color: #ef4444;
        background: linear-gradient(90deg, #fca5a5 0%, #ef4444 100%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        display: inline-block;
    }

    .subtitle {
        font-size: 32px;
        color: #cbd5e1;
        font-weight: 400;
        line-height: 1.6;
        max-width: 900px;
        margin: 0;
        text-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
    }
</style>

<div class="slide-wrapper">
    <!-- Logo MedMapa -->
    <div class="top-bar">
        <div class="logo-icon">
            <svg width="42" height="42" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 3 2 6v15l7-3 6 3 7-3V3l-7 3-6-3z" />
                <path d="M9 3v15" />
                <path d="M15 6v15" />
            </svg>
        </div>
        MedMapa
    </div>

    <div class="main-content">
        <div class="tag">O mercado enlouqueceu</div>
        <h1 class="h1-title">Sua aprovação no R1 não precisa custar o preço de um <span class="highlight-red">carro
                zero.</span></h1>
        <p class="subtitle">Por que você paga mensalidades abusivas por materiais que nem tem tempo de usar?</p>
    </div>
</div>

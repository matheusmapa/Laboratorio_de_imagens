<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    .slide-wrapper {
        width: 1080px;
        height: 1350px;
        background: linear-gradient(135deg, #080b14 0%, #111827 100%);
        font-family: 'Inter', sans-serif;
        position: relative;
        padding: 120px 100px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        box-sizing: border-box;
        color: white;
        overflow: hidden;
    }

    .slide-wrapper::before {
        content: '';
        position: absolute;
        top: 0;
        left: -30%;
        width: 140%;
        height: 140%;
        background: radial-gradient(circle at 30% 50%, rgba(239, 68, 68, 0.12) 0%, transparent 60%);
        pointer-events: none;
        z-index: 0;
    }

    .content-area {
        z-index: 1;
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        gap: 60px;
    }

    .h2-title {
        font-size: 72px;
        font-weight: 900;
        line-height: 1.15;
        letter-spacing: -2px;
        margin: 0;
        text-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
    }

    .receipt-card {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 24px;
        padding: 60px 50px;
        width: 100%;
        max-width: 800px;
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.7), inset 0 1px 0 rgba(255, 255, 255, 0.08);
        position: relative;
        transform: rotate(-2deg);
    }

    .receipt-card::before {
        content: '';
        position: absolute;
        top: -15px;
        left: 0;
        right: 0;
        height: 30px;
        background: transparent;
        background-image: radial-gradient(circle at 15px 15px, #080b14 15px, transparent 16px);
        background-size: 30px 30px;
        background-position: -15px -15px;
        background-repeat: repeat-x;
    }

    .receipt-card::after {
        content: '';
        position: absolute;
        bottom: -15px;
        left: 0;
        right: 0;
        height: 30px;
        background: transparent;
        background-image: radial-gradient(circle at 15px 15px, #080b14 15px, transparent 16px);
        background-size: 30px 30px;
        background-position: -15px 15px;
        background-repeat: repeat-x;
    }

    .receipt-header {
        font-size: 24px;
        color: #94a3b8;
        text-transform: uppercase;
        letter-spacing: 2px;
        margin-bottom: 50px;
        font-family: monospace;
        text-align: center;
    }

    .receipt-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 30px;
        font-size: 32px;
        font-weight: 500;
        color: #cbd5e1;
    }

    .receipt-total {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 50px;
        padding-top: 40px;
        border-top: 2px dashed rgba(255, 255, 255, 0.1);
        font-size: 46px;
        font-weight: 900;
        color: #f87171;
        text-shadow: 0 5px 15px rgba(239, 68, 68, 0.3);
    }

    .strike {
        position: relative;
    }

    .strike::after {
        content: '';
        position: absolute;
        left: -15px;
        top: 50%;
        width: calc(100% + 30px);
        height: 6px;
        background: #ef4444;
        transform: rotate(-6deg);
        border-radius: 4px;
        box-shadow: 0 0 15px rgba(239, 68, 68, 0.8), 0 0 5px rgba(239, 68, 68, 1);
    }

    .body-text {
        font-size: 30px;
        color: #cbd5e1;
        font-weight: 400;
        line-height: 1.6;
        margin: 0;
        max-width: 850px;
        text-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
    }
</style>

<div class="slide-wrapper">
    <div class="content-area">
        <h2 class="h2-title">A indústria do medo <span style="color: #ef4444;">te cobra caro.</span></h2>

        <div class="receipt-card">
            <div class="receipt-header">Fatura - Cursinho Tradicional</div>
            <div class="receipt-item">
                <span>Apostilas Gigantes</span>
                <span>R$ 4.500</span>
            </div>
            <div class="receipt-item">
                <span>Aulas desnecessárias</span>
                <span>R$ 5.500</span>
            </div>
            <div class="receipt-total">
                <span>Total Anual:</span>
                <span class="strike">R$ 10.000+</span>
            </div>
        </div>

        <p class="body-text">Eles te vendem o mundo para, no fim das contas, você só usar o banco de questões deles.</p>
    </div>
</div>

<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    .slide {
        width: 1080px;
        height: 1350px;
        background: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #030612 100%);
        font-family: 'Inter', sans-serif;
        position: relative;
        padding: 80px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        box-sizing: border-box;
        color: white;
        overflow: hidden;
        perspective: 1500px;
        /* IMPORTANTE PARA O 3D */
    }

    .scene {
        position: relative;
        transform: rotateX(10deg) rotateY(-15deg);
        transform-style: preserve-3d;
    }

    .card-3d {
        width: 600px;
        height: 800px;
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0.02) 100%);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 40px;
        backdrop-filter: blur(20px);
        padding: 60px;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        box-shadow: -50px 50px 100px rgba(0, 0, 0, 0.5);
        position: relative;
    }

    /* Brilho na borda 3D */
    .card-3d::after {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border-radius: 40px;
        box-shadow: inset 0 0 20px rgba(59, 130, 246, 0.4);
        pointer-events: none;
    }

    .floating-sticker {
        position: absolute;
        top: -100px;
        right: -80px;
        width: 400px;
        height: 400px;
        transform: translateZ(100px);
        /* Traz o item pra frente no 3D */
        filter: drop-shadow(0 30px 50px rgba(0, 0, 0, 0.8));
        mix-blend-mode: screen;
    }

    .card-title {
        font-size: 64px;
        font-weight: 900;
        line-height: 1;
        margin-bottom: 20px;
    }

    .card-desc {
        font-size: 24px;
        color: rgba(255, 255, 255, 0.6);
        font-weight: 600;
    }
</style>

<div class="slide">
    <div class="scene">
        <div class="card-3d">
            <h2 class="card-title">Espaço<br>Tridmensional</h2>
            <p class="card-desc">Use `perspective` e `translateZ` para saltar da tela.</p>
        </div>
        <img src="/posts/003-design-expert/assets/sticker.png" class="floating-sticker">
    </div>
</div>

<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    .slide {
        width: 1080px;
        height: 1350px;
        background: #000;
        font-family: 'Inter', sans-serif;
        position: relative;
        display: flex;
        box-sizing: border-box;
        overflow: hidden;
    }

    .side {
        flex: 1;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 80px;
        position: relative;
    }

    .left {
        background: #fff;
        color: #000;
    }

    .right {
        background: #030612;
        color: #fff;
    }

    .title {
        font-size: 90px;
        font-weight: 900;
        line-height: 0.9;
        letter-spacing: -4px;
        margin-bottom: 30px;
    }

    .desc {
        font-size: 28px;
        font-weight: 600;
        opacity: 0.7;
    }

    .divider {
        position: absolute;
        left: 50%;
        top: 0;
        width: 2px;
        height: 100%;
        background: rgba(139, 92, 246, 0.3);
        z-index: 10;
    }

    .vs-badge {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 120px;
        height: 120px;
        background: #8b5cf6;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 900;
        font-size: 40px;
        color: #fff;
        z-index: 11;
        box-shadow: 0 0 40px rgba(139, 92, 246, 0.6);
    }
</style>

<div class="slide">
    <div class="divider"></div>
    <div class="vs-badge">VS</div>

    <div class="side left">
        <h2 class="title">Modo<br>Claro</h2>
        <p class="desc">Design minimalista e alto contraste.</p>
    </div>

    <div class="side right">
        <h2 class="title">Modo<br>Escuro</h2>
        <p class="desc">Visual premium e luzes neon.</p>
    </div>
</div>

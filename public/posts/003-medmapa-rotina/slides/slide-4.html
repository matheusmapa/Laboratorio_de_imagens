<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    .slide-wrapper {
        width: 1080px;
        height: 1350px;
        background: linear-gradient(145deg, #080b14 0%, #111827 100%);
        font-family: 'Inter', sans-serif;
        position: relative;
        padding: 120px 80px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        box-sizing: border-box;
        color: white;
        overflow: hidden;
    }

    .slide-wrapper::before {
        content: '';
        position: absolute;
        bottom: -20%;
        left: -10%;
        width: 140%;
        height: 140%;
        background: radial-gradient(circle at 30% 80%, rgba(16, 185, 129, 0.1) 0%, transparent 60%);
        pointer-events: none;
        z-index: 0;
    }

    .content-area {
        z-index: 1;
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        gap: 60px;
    }

    .h2-title {
        font-size: 68px;
        font-weight: 900;
        line-height: 1.15;
        letter-spacing: -2px;
        margin: 0;
        text-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
    }

    .dashboard-card {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 40px;
        padding: 60px;
        width: 100%;
        max-width: 850px;
        backdrop-filter: blur(20px);
        box-shadow: 0 40px 80px -15px rgba(0, 0, 0, 0.7), inset 0 2px 20px rgba(255, 255, 255, 0.03);
        display: flex;
        flex-direction: column;
        gap: 40px;
    }

    .stat-row {
        display: flex;
        flex-direction: column;
        gap: 15px;
        text-align: left;
    }

    .stat-label {
        font-size: 24px;
        font-weight: 700;
        color: #94a3b8;
        display: flex;
        justify-content: space-between;
    }

    .stat-value {
        color: #fff;
    }

    .progress-container {
        width: 100%;
        height: 24px;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 100px;
        position: relative;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .progress-bar {
        height: 100%;
        border-radius: 100px;
        position: absolute;
        top: 0;
        left: 0;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
    }

    .bar-green {
        width: 72%;
        background: linear-gradient(90deg, #10b981 0%, #34d399 100%);
        box-shadow: 0 0 20px rgba(16, 185, 129, 0.4);
    }

    .bar-red {
        width: 28%;
        background: linear-gradient(90deg, #ef4444 0%, #f87171 100%);
        box-shadow: 0 0 20px rgba(239, 68, 68, 0.4);
    }

    .body-text {
        font-size: 32px;
        color: #cbd5e1;
        font-weight: 500;
        line-height: 1.6;
        max-width: 900px;
    }

    .highlight-green {
        color: #34d399;
        font-weight: 800;
    }
</style>

<div class="slide-wrapper">
    <div class="content-area">
        <h2 class="h2-title">Errou no plantão? <br>O sistema salva.</h2>

        <div class="dashboard-card">
            <div class="stat-row">
                <div class="stat-label">
                    <span>DOMÍNIO CLÍNICO</span>
                    <span class="stat-value">72%</span>
                </div>
                <div class="progress-container">
                    <div class="progress-bar bar-green"></div>
                </div>
            </div>

            <div class="stat-row">
                <div class="stat-label" style="color: #f87171;">
                    <span>PONTOS DE ATENÇÃO</span>
                    <span class="stat-value">28%</span>
                </div>
                <div class="progress-container">
                    <div class="progress-bar bar-red"></div>
                </div>
            </div>
        </div>

        <p class="body-text">Mapeie suas fraquezas em tempo real. Nosso <span class="highlight-green">Caderno de Erros
                Automático</span> salva onde você tropeçou para você matar a dúvida no fim de semana.</p>
    </div>
</div>

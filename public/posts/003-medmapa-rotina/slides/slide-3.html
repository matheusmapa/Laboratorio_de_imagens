<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    .slide-wrapper {
        width: 1080px;
        height: 1350px;
        background: linear-gradient(135deg, #080b14 0%, #111827 100%);
        font-family: 'Inter', sans-serif;
        position: relative;
        padding: 120px 100px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        box-sizing: border-box;
        color: white;
        overflow: hidden;
    }

    .slide-wrapper::before {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 140%;
        height: 140%;
        background: radial-gradient(circle at center, rgba(37, 99, 235, 0.15) 0%, transparent 65%);
        pointer-events: none;
        z-index: 0;
    }

    .content-area {
        z-index: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        width: 100%;
        gap: 60px;
    }

    .h2-title {
        font-size: 72px;
        font-weight: 900;
        line-height: 1.15;
        letter-spacing: -2px;
        margin: 0;
        text-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
    }

    .highlight-blue {
        color: #60a5fa;
        background: linear-gradient(90deg, #93c5fd 0%, #3b82f6 100%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .app-interface {
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 30px;
        perspective: 1000px;
    }

    .ui-card {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 32px;
        padding: 45px;
        backdrop-filter: blur(20px);
        box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.6), inset 0 2px 20px rgba(255, 255, 255, 0.05);
        display: flex;
        align-items: center;
        gap: 40px;
        text-align: left;
        transform: rotateX(10deg);
        transition: transform 0.3s;
    }

    .ui-card:nth-child(2) {
        transform: rotateX(10deg) translateX(40px);
        border-color: rgba(59, 130, 246, 0.3);
        background: rgba(59, 130, 246, 0.05);
    }

    .icon-box {
        width: 80px;
        height: 80px;
        background: rgba(59, 130, 246, 0.1);
        border-radius: 20px;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-shrink: 0;
        border: 1px solid rgba(59, 130, 246, 0.2);
        box-shadow: 0 10px 20px rgba(59, 130, 246, 0.2);
    }

    .icon-box svg {
        color: #60a5fa;
        width: 40px;
        height: 40px;
        filter: drop-shadow(0 0 10px rgba(96, 165, 250, 0.6));
    }

    .card-info {
        display: flex;
        flex-direction: column;
        gap: 8px;
    }

    .card-label {
        font-size: 20px;
        font-weight: 700;
        color: #3b82f6;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .card-main-text {
        font-size: 30px;
        font-weight: 600;
        color: #fff;
    }

    .body-text {
        font-size: 32px;
        color: #cbd5e1;
        line-height: 1.6;
        margin-top: 20px;
        max-width: 900px;
    }
</style>

<div class="slide-wrapper">
    <div class="content-area">
        <h2 class="h2-title">Seu estudo precisa ser ágil. <br><span class="highlight-blue">Hackeie sua rotina.</span>
        </h2>

        <div class="app-interface">
            <div class="ui-card">
                <div class="icon-box">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                        stroke-linejoin="round">
                        <rect width="18" height="18" x="3" y="3" rx="2" />
                        <path d="M3 9h18" />
                        <path d="M9 21V9" />
                    </svg>
                </div>
                <div class="card-info">
                    <div class="card-label">Sessão Rápida</div>
                    <div class="card-main-text">10 questões no Uber / Intervalo</div>
                </div>
            </div>

            <div class="ui-card">
                <div class="icon-box">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M12 2v20" />
                        <path d="m4.93 4.93 14.14 14.14" />
                        <path d="M2 12h20" />
                        <path d="m19.07 4.93-14.14 14.14" />
                    </svg>
                </div>
                <div class="card-info">
                    <div class="card-label">Caderno de Erros</div>
                    <div class="card-main-text">Revisão cirúrgica em 5 min</div>
                </div>
            </div>
        </div>

        <p class="body-text">Esqueça o "tudo ou nada". O MedMapa foi desenhado para render em intervalos curtos, direto
            ao ponto.</p>
    </div>
</div>

<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    .slide-wrapper {
        width: 1080px;
        height: 1350px;
        background: linear-gradient(135deg, #080b14 0%, #111827 100%);
        font-family: 'Inter', sans-serif;
        position: relative;
        padding: 120px 80px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        box-sizing: border-box;
        color: white;
        overflow: hidden;
    }

    .slide-wrapper::before {
        content: '';
        position: absolute;
        top: 0;
        right: -30%;
        width: 140%;
        height: 140%;
        background: radial-gradient(circle at 70% 30%, rgba(239, 68, 68, 0.08) 0%, transparent 60%);
        pointer-events: none;
        z-index: 0;
    }

    .h2-title {
        font-size: 72px;
        font-weight: 900;
        line-height: 1.15;
        letter-spacing: -2px;
        margin-bottom: 20px;
        text-align: center;
        text-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
        z-index: 2;
    }

    .h2-highlight {
        color: #ef4444;
        text-shadow: 0 0 30px rgba(239, 68, 68, 0.3);
    }

    .chaos-container {
        position: relative;
        width: 100%;
        height: 600px;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 1;
    }

    .chaos-card {
        position: absolute;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 28px;
        padding: 40px;
        backdrop-filter: blur(15px);
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 2px 10px rgba(255, 255, 255, 0.05);
        max-width: 600px;
        transition: transform 0.3s ease;
    }

    .card-1 {
        transform: rotate(-6deg) translate(-120px, -150px);
        z-index: 5;
        border-color: rgba(239, 68, 68, 0.3);
    }

    .card-2 {
        transform: rotate(4deg) translate(140px, -40px);
        z-index: 4;
    }

    .card-3 {
        transform: rotate(-2deg) translate(-80px, 120px);
        z-index: 3;
    }

    .item-text {
        font-size: 26px;
        font-weight: 500;
        line-height: 1.5;
        color: #e2e8f0;
        display: flex;
        align-items: center;
        gap: 20px;
    }

    .x-icon {
        color: #ef4444;
        font-size: 32px;
        font-weight: 900;
        filter: drop-shadow(0 0 8px rgba(239, 68, 68, 0.6));
    }

    .label-chaos {
        position: absolute;
        background: #ef4444;
        color: white;
        font-size: 20px;
        font-weight: 800;
        padding: 8px 16px;
        border-radius: 8px;
        top: -20px;
        left: 20px;
        text-transform: uppercase;
        box-shadow: 0 10px 20px rgba(239, 68, 68, 0.4);
    }
</style>

<div class="slide-wrapper">
    <h2 class="h2-title">Tentar fazer resumo agora é <span class="h2-highlight">perder tempo.</span></h2>

    <div class="chaos-container">
        <!-- Card 1 -->
        <div class="chaos-card card-1">
            <div class="label-chaos">Plantão 12h</div>
            <div class="item-text">
                <span class="x-icon">❌</span>
                Esperar ter 4 horas livres pra sentar na biblioteca.
            </div>
        </div>

        <!-- Card 2 -->
        <div class="chaos-card card-2">
            <div class="item-text">
                <span class="x-icon">❌</span>
                Tentar ler PDF denso no celular entre um atendimento e outro.
            </div>
        </div>

        <!-- Card 3 -->
        <div class="chaos-card card-3">
            <div class="item-text">
                <span class="x-icon">❌</span>
                Acumular matéria e sentir a culpa batendo forte no domingo.
            </div>
        </div>
    </div>
</div>

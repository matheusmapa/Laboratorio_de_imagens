<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    .slide-wrapper {
        width: 1080px;
        height: 1350px;
        background: linear-gradient(145deg, #080b14 0%, #111827 100%);
        font-family: 'Inter', sans-serif;
        position: relative;
        padding: 120px 100px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        box-sizing: border-box;
        color: white;
        overflow: hidden;
    }

    .slide-wrapper::before {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 150%;
        height: 150%;
        background: radial-gradient(circle at 50% 50%, rgba(16, 185, 129, 0.15) 0%, transparent 65%);
        pointer-events: none;
        z-index: 0;
    }

    .content-area {
        z-index: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        width: 100%;
        gap: 60px;
    }

    .h2-title {
        font-size: 72px;
        font-weight: 900;
        line-height: 1.15;
        letter-spacing: -2px;
        margin: 0;
        text-shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
    }

    .pricing-card {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 45px;
        padding: 70px 60px;
        width: 100%;
        max-width: 800px;
        backdrop-filter: blur(25px);
        box-shadow: 0 40px 90px -20px rgba(0, 0, 0, 0.8), inset 0 2px 30px rgba(255, 255, 255, 0.03);
        display: flex;
        flex-direction: column;
        align-items: center;
        position: relative;
    }

    .pricing-card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 2px;
        background: linear-gradient(90deg, transparent, rgba(16, 185, 129, 0.4), transparent);
    }

    .price-value {
        font-size: 110px;
        font-weight: 900;
        color: #fff;
        line-height: 1;
        margin-bottom: 20px;
        letter-spacing: -4px;
        text-shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
    }

    .price-value span {
        font-size: 32px;
        font-weight: 600;
        color: #94a3b8;
        letter-spacing: 0;
    }

    .plan-detail {
        font-size: 26px;
        font-weight: 700;
        color: #34d399;
        text-transform: uppercase;
        letter-spacing: 2px;
        margin-bottom: 50px;
        text-shadow: 0 0 20px rgba(52, 211, 153, 0.3);
    }

    .cta-button {
        background: #10b981;
        color: #022c22;
        font-size: 24px;
        font-weight: 800;
        padding: 24px 56px;
        border-radius: 100px;
        text-align: center;
        box-shadow: 0 12px 35px rgba(16, 185, 129, 0.4), 0 0 20px rgba(16, 185, 129, 0.2);
        transition: transform 0.2s, box-shadow 0.2s;
        display: inline-block;
    }

    .footer {
        font-size: 28px;
        font-weight: 500;
        color: #94a3b8;
        max-width: 800px;
        line-height: 1.5;
        text-shadow: 0 5px 15px rgba(0, 0, 0, 0.4);
    }
</style>

<div class="slide-wrapper">
    <div class="content-area">
        <h2 class="h2-title">Sua rota pro R1 começa nos "buraquinhos" da sua agenda.</h2>

        <div class="pricing-card">
            <div class="price-value">R$ 19,90<span>/mês</span></div>
            <div class="plan-detail">
                PLANO MENSAL<br>
                BANCO DE QUESTÕES +<br>
                GESTÃO INTELIGENTE
            </div>

            <div class="cta-button">Garantia de 7 Dias</div>
        </div>

        <div class="footer">↑ Toque no link da bio, espie a plataforma e pare de estudar errado.</div>
    </div>
</div>

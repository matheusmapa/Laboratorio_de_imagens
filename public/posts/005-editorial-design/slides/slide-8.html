<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    .slide {
        width: 1080px;
        height: 1350px;
        background: #fff;
        font-family: 'Inter', sans-serif;
        position: relative;
        padding: 80px;
        display: flex;
        flex-direction: column;
        box-sizing: border-box;
        color: #000;
    }

    .path-svg {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
    }

    .title {
        font-size: 90px;
        font-weight: 900;
        margin-bottom: 100px;
        position: relative;
        z-index: 1;
    }

    .nodes {
        display: flex;
        flex-direction: column;
        gap: 150px;
        position: relative;
        z-index: 1;
    }

    .node {
        display: flex;
        align-items: center;
        gap: 40px;
    }

    .dot {
        width: 40px;
        height: 40px;
        background: #000;
        border-radius: 50%;
        border: 8px solid #fff;
        box-shadow: 0 0 0 4px #000;
    }

    .node-text {
        font-size: 32px;
        font-weight: 800;
    }

    .node-desc {
        font-size: 20px;
        opacity: 0.6;
    }
</style>

<div class="slide">
    <!-- SVG decorativo de linha de tempo -->
    <svg class="path-svg" viewBox="0 0 1080 1350" fill="none">
        <path d="M100 250 C 300 250, 300 1200, 100 1200" stroke="black" stroke-width="4" stroke-dasharray="10 10" />
    </svg>

    <h1 class="title">Visual Paths.</h1>

    <div class="nodes">
        <div class="node" style="padding-left: 20px;">
            <div class="dot"></div>
            <div>
                <div class="node-text">Começo da Jornada</div>
                <div class="node-desc">Onde o interesse é capturado.</div>
            </div>
        </div>
        <div class="node" style="padding-left: 100px;">
            <div class="dot"></div>
            <div>
                <div class="node-text">O Conflito Visual</div>
                <div class="node-desc">Quebras de padrão e contraste.</div>
            </div>
        </div>
        <div class="node" style="padding-left: 20px;">
            <div class="dot"></div>
            <div>
                <div class="node-text">A Resolução</div>
                <div class="node-desc">Call to action e clareza final.</div>
            </div>
        </div>
    </div>
</div>

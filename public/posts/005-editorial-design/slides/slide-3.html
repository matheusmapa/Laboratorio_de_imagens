<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    .slide {
        width: 1080px;
        height: 1350px;
        background: #f4f4f4;
        font-family: 'Inter', sans-serif;
        position: relative;
        overflow: hidden;
        box-sizing: border-box;
    }

    .paper-texture {
        position: absolute;
        inset: 0;
        background-image: url('/posts/005-editorial-design/assets/paper.png');
        background-size: cover;
        opacity: 0.8;
        z-index: 0;
    }

    .content {
        position: relative;
        z-index: 10;
        padding: 80px;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
    }

    .statue-container {
        position: absolute;
        right: -100px;
        bottom: 50px;
        width: 800px;
        z-index: 5;
        transform: rotate(-5deg);
    }

    .statue-img {
        width: 100%;
        mix-blend-mode: multiply;
        /* Mescla com o papel */
    }

    .tape {
        position: absolute;
        width: 250px;
        top: 40px;
        left: 40px;
        z-index: 20;
        mix-blend-mode: screen;
        transform: rotate(-10deg);
        filter: drop-shadow(0 5px 10px rgba(0, 0, 0, 0.2));
    }

    .title {
        font-size: 150px;
        font-weight: 900;
        color: #000;
        line-height: 0.8;
        letter-spacing: -8px;
        margin-bottom: 20px;
        z-index: 15;
    }

    .mixed-label {
        background: #000;
        color: #fff;
        display: inline-block;
        padding: 5px 20px;
        font-size: 24px;
        font-weight: 800;
        text-transform: uppercase;
        margin-bottom: 40px;
    }
</style>

<div class="slide">
    <div class="paper-texture"></div>
    <img src="/posts/005-editorial-design/assets/tape.png" class="tape">

    <div class="content">
        <div class="mixed-label">Mixed Media Style</div>
        <h1 class="title">ART &<br>CODE.</h1>
        <p style="font-size: 32px; font-weight: 700; max-width: 500px; color: #333;">A fusão de texturas analógicas com
            código digital cria o estilo "Vogue Tech".</p>
    </div>

    <div class="statue-container">
        <img src="/posts/005-editorial-design/assets/statue.png" class="statue-img" style="mix-blend-mode: screen;">
    </div>
</div>

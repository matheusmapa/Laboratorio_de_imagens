<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    .story {
        width: 1080px;
        height: 1080px;
        position: relative;
        overflow: hidden;
        background: #f8fafc; /* Fundo off-white */
        font-family: 'Inter', sans-serif;
        box-sizing: border-box;
    }

    /* === ORBES PREMIUM DE LUZ (150px Blur) === */
    .orb-cyan {
        position: absolute;
        width: 600px;
        height: 600px;
        background: #cffafe;
        border-radius: 50%;
        top: -100px;
        left: -100px;
        filter: blur(150px);
        z-index: 1;
        opacity: 0.9;
    }

    .orb-magenta {
        position: absolute;
        width: 600px;
        height: 600px;
        background: #fbcfe8;
        border-radius: 50%;
        bottom: -100px;
        right: -100px;
        filter: blur(150px);
        z-index: 1;
        opacity: 0.9;
    }

    .orb-mint {
        position: absolute;
        width: 700px;
        height: 700px;
        background: #d1fae5;
        border-radius: 50%;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        filter: blur(150px);
        z-index: 1;
        opacity: 0.7;
    }

    /* === ZONAS SEGURAS ABSOLUTAS E LAYOUT === */
    .safe-zone {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        padding-top: 60px; /* Respiro gentil no topo */
        padding-bottom: 250px; /* Safe Zone obrigatória do WhatsApp (Reply area) */
        padding-left: 60px;
        padding-right: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        z-index: 10;
        box-sizing: border-box;
        gap: 24px; /* Ritmo vertical entre as zonas */
    }

    /* === HEADER E FOOTER PADRÃO === */
    .brand-header {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        margin-bottom: 10px;
        color: #0f172a;
    }

    .brand-header .logo-icon {
        width: 36px;
        height: 36px;
    }

    .brand-header .brand-text {
        font-size: 28px;
        font-weight: 800;
        letter-spacing: -1px;
        margin: 0;
    }

    .footer-absolute {
        position: absolute;
        bottom: 60px; /* Bem lá no rodapé, usando a safe zone */
        left: 0;
        right: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        color: #334155; /* Preto chumbo */
        z-index: 20;
    }

    .footer-absolute .logo-icon {
        width: 28px;
        height: 28px;
    }

    .footer-absolute .url-text {
        font-size: 20px;
        font-weight: 700;
        letter-spacing: 2px;
        margin: 0;
    }

    /* === GLASSMORPHISM BASE === */
    .glass-card {
        background: rgba(255, 255, 255, 0.6);
        backdrop-filter: blur(28px);
        -webkit-backdrop-filter: blur(28px);
        border: 1px solid rgba(255, 255, 255, 0.9);
        box-shadow: 0 40px 80px rgba(0,0,0,0.06), inset 0 0 0 1px rgba(255,255,255,0.4);
        border-radius: 40px;
        box-sizing: border-box;
    }

    /* === ZONE 1: TOP SECTION (ESTUDO INTELIGENTE) === */
    .zone-1 {
        width: 100%;
        padding: 40px;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
    }

    .z1-headline {
        font-size: 56px;
        font-weight: 900;
        color: #000000;
        letter-spacing: -2px;
        margin: 0 0 8px 0;
        text-transform: uppercase;
    }

    .z1-copy {
        font-size: 24px;
        font-weight: 600;
        color: #334155; /* Cinza chumbo leve */
        margin: 0;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    /* === ZONE 2: MIDDLE SECTION (2 COLUNAS) === */
    .zone-2-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 24px;
        width: 100%;
    }

    .zone-2-card {
        padding: 40px;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        position: relative; /* Para esconder pseudo-orbes se necessário, mas o background vai resolver */
    }

    /* Orbes contidas nas colunas */
    .col-cyan-bg {
        background: linear-gradient(135deg, rgba(207, 250, 254, 0.4) 0%, rgba(255,255,255,0.6) 100%);
    }
    .col-magenta-bg {
        background: linear-gradient(135deg, rgba(251, 207, 232, 0.4) 0%, rgba(255,255,255,0.6) 100%);
    }

    .z2-icon {
        width: 48px;
        height: 48px;
        color: #0f172a;
        margin-bottom: 24px;
    }

    .z2-headline {
        font-size: 32px;
        font-weight: 800;
        color: #000000;
        line-height: 1.2;
        margin: 0 0 24px 0;
        text-transform: uppercase;
    }

    .z2-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
        width: 100%;
    }

    .z2-list-item {
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 22px;
        font-weight: 600;
        color: #334155;
    }

    .check-icon {
        width: 24px;
        height: 24px;
        color: #10B981;
    }

    /* === ZONE 3: BOTTOM SECTION (OFERTA) === */
    .zone-3 {
        width: 100%;
        padding: 0; /* Padding especial gerido pelos filhos */
        display: flex;
        flex-direction: column;
        overflow: hidden; /* Para o bloco verde do rodapé arredondar */
    }

    .z3-top {
        padding: 40px;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        background: linear-gradient(to bottom, rgba(209, 250, 229, 0.3), transparent); /* Orbe verde interna super sutil */
    }

    .price-headline {
        font-size: 72px;
        font-weight: 900;
        color: #000000;
        letter-spacing: -3px;
        margin: 0 0 16px 0;
    }

    .price-bullets {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 16px;
        font-size: 24px;
        font-weight: 700;
        color: #334155;
    }

    .z3-bottom {
        background: #10B981;
        padding: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
    }

    .coupon-solid-text {
        font-size: 32px;
        font-weight: 900;
        color: #ffffff;
        letter-spacing: 4px;
        text-transform: uppercase;
        margin: 0;
    }
</style>

            <line x1="9" y1="3" x2="9" y2="18"></line>

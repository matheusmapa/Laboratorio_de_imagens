<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    .slide-wrapper {
        width: 1080px;
        height: 1350px;
        background: linear-gradient(135deg, #080b14 0%, #111827 100%);
        font-family: 'Inter', sans-serif;
        position: relative;
        padding: 100px 80px;
        display: flex;
        flex-direction: column;
        box-sizing: border-box;
        color: white;
        overflow: hidden;
    }

    .slide-wrapper::before {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 130%;
        height: 130%;
        background: radial-gradient(circle at center, rgba(37, 99, 235, 0.05) 0%, transparent 70%);
        pointer-events: none;
        z-index: 0;
    }

    .h2-title {
        font-size: 68px;
        font-weight: 900;
        line-height: 1.15;
        letter-spacing: -2px;
        margin-bottom: 60px;
        text-align: center;
        text-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
        z-index: 1;
    }

    .grid-container {
        display: grid;
        grid-template-columns: 1fr;
        gap: 30px;
        z-index: 1;
    }

    .glass-card {
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 32px;
        padding: 40px 45px;
        backdrop-filter: blur(20px);
        display: flex;
        align-items: center;
        gap: 35px;
        box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.5), inset 0 2px 10px rgba(255, 255, 255, 0.03);
    }

    .card-icon {
        font-size: 44px;
        flex-shrink: 0;
    }

    .card-content {
        display: flex;
        flex-direction: column;
        gap: 6px;
    }

    .card-title {
        font-size: 30px;
        font-weight: 800;
        color: #fff;
    }

    .card-text {
        font-size: 24px;
        font-weight: 400;
        color: #94a3b8;
    }

    .highlight-blue {
        color: #60a5fa;
    }
</style>

        <!-- Item 1 -->

            </div>
        </div>

        <div class="glass-card">
            <div class="card-icon">🤝</div>

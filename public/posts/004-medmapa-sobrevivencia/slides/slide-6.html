<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    .slide-wrapper {
        width: 1080px;
        height: 1350px;
        background: linear-gradient(135deg, #080b14 0%, #111827 100%);
        font-family: 'Inter', sans-serif;
        position: relative;
        padding: 120px 80px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        box-sizing: border-box;
        color: white;
        overflow: hidden;
    }

    .slide-wrapper::before {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 140%;
        height: 140%;
        background: radial-gradient(circle at center, rgba(37, 99, 235, 0.1) 0%, transparent 65%);
        pointer-events: none;
        z-index: 0;
    }

    .h2-title {
        font-size: 72px;
        font-weight: 900;
        line-height: 1.15;
        letter-spacing: -2px;
        margin-bottom: 50px;
        text-align: center;
        text-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
        z-index: 1;
    }

    .bento-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: auto auto;
        gap: 20px;
        width: 100%;
        max-width: 900px;
        z-index: 1;
    }

    .bento-item {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 24px;
        padding: 24px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 12px;
        backdrop-filter: blur(20px);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }

    .bento-item.active {
        background: rgba(59, 130, 246, 0.1);
        border-color: rgba(59, 130, 246, 0.3);
        box-shadow: 0 0 20px rgba(59, 130, 246, 0.2);
    }

    .bento-title {
        font-size: 20px;
        font-weight: 700;
        color: #94a3b8;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .bento-item.active .bento-title {
        color: #60a5fa;
    }

    .bg-icon {
        font-size: 40px;
    }

    .body-text {
        font-size: 32px;
        color: #cbd5e1;
        line-height: 1.6;
        margin-top: 50px;
        text-align: center;
        max-width: 900px;
        z-index: 1;
    }

    .highlight-blue {
        color: #60a5fa;
        font-weight: 800;
    }
</style>

<div class="slide-wrapper">
    <h2 class="h2-title">Chegue afiado pro <br><span class="highlight-blue">rodízio do dia.</span></h2>

    <div class="bento-grid">
        <div class="bento-item active">
            <span class="bg-icon">🩺</span>
            <div class="bento-title">Clínica Médica</div>
        </div>
        <div class="bento-item">
            <span class="bg-icon">🔪</span>
            <div class="bento-title">Cirurgia Geral</div>
        </div>
        <div class="bento-item">
            <span class="bg-icon">👶</span>
            <div class="bento-title">Pediatria</div>
        </div>
        <div class="bento-item">
            <span class="bg-icon">🤰</span>
            <div class="bento-title">Ginecologia</div>
        </div>
    </div>

    <p class="body-text">Vai rodar em Cardio? Filtre os temas mais incidentes no MedMapa e resolva 15 questões antes de
        sair de casa. <b>Você antecipa o que o preceptor vai te cobrar.</b></p>
</div>
